name: CI

on:
  push:
    branches: [main, anas]
  pull_request:
    branches: [main, anas]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint · types · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (core + agent + dev + verdict)
        run: pip install -e ".[agent,dev,verdict]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Type check (mypy, strict)
        run: mypy src

      # Tests run on the deterministic backend: no API key, fully reproducible.
      - name: Tests (pytest)
        env:
          NVIDIA_API_KEY: ""
        run: pytest -q

  ui:
    name: UI (build · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Informational: surfaces new vulnerabilities without blocking the merge.
      - name: Audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
