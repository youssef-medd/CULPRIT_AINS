<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Culprit — Soft UI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap');

:root[data-theme="light"]{
  --bg:#F2F3F8; --card:#FFFFFF; --card-2:#F8F9FA;
  --ink:#344767; --muted:#67748E; --muted2:#A0AEC0; --line:#EEF1F6;
  --soft:0 20px 27px 0 rgba(20,20,80,.06); --soft-sm:0 4px 12px 0 rgba(20,20,80,.06);
  --sidebar:#FFFFFF;
}
:root[data-theme="dark"]{
  --bg:#0E1018; --card:#171A23; --card-2:#1C2030;
  --ink:#E9ECF5; --muted:#A6AFC4; --muted2:#6B7488; --line:rgba(255,255,255,.06);
  --soft:0 20px 40px -18px rgba(0,0,0,.65); --soft-sm:0 8px 20px -14px rgba(0,0,0,.6);
  --sidebar:#141722;
}
:root{
  --g-primary:linear-gradient(310deg,#7928CA,#FF0080);
  --g-info:linear-gradient(310deg,#2152FF,#21D4FD);
  --g-success:linear-gradient(310deg,#17AD37,#98EC2D);
  --g-warning:linear-gradient(310deg,#F53939,#FBCF33);
  --g-orange:linear-gradient(310deg,#F5871F,#FBCF33);
  --g-dark:linear-gradient(310deg,#141727,#3A416F);
  --primary:#CB0C9F; --info:#2152FF; --success:#17AD37; --warning:#F5871F; --danger:#EA0606;
  --c-retrieval:#2152FF; --c-planning:#7928CA; --c-tool_execution:#17AD37; --c-synthesis:#F5871F;
  --sans:'Open Sans',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --r:1rem; --r-sm:.75rem;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#cfd6e4;border-radius:6px}
.tnum{font-variant-numeric:tabular-nums}
a{color:inherit;text-decoration:none}

/* ---------- shell ---------- */
.shell{display:grid;grid-template-columns:250px minmax(0,1fr);gap:0;min-height:100vh;padding:16px}
@media(max-width:1100px){.shell{grid-template-columns:1fr}}
.sidebar{background:var(--sidebar);border-radius:var(--r);box-shadow:var(--soft);padding:18px 14px;
  position:sticky;top:16px;height:calc(100vh - 32px);display:flex;flex-direction:column;gap:4px}
@media(max-width:1100px){.sidebar{display:none}}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px;border-bottom:1px solid var(--line);margin-bottom:12px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:var(--g-primary);display:grid;place-items:center;color:#fff;
  box-shadow:0 6px 14px -4px rgba(203,12,159,.5)}
.brand b{font-size:15px;font-weight:700;letter-spacing:-.01em}
.brand small{display:block;font-size:10.5px;color:var(--muted2);font-weight:600}
.navlabel{font-size:10.5px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.04em;padding:12px 10px 6px}
.nav{display:flex;align-items:center;gap:12px;padding:9px 11px;border-radius:.7rem;cursor:pointer;color:var(--muted);
  font-weight:600;font-size:13.5px;transition:background .2s,color .2s,box-shadow .2s;border:0;background:transparent;width:100%;text-align:left}
.nav .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:var(--card-2);color:var(--muted);flex:0 0 auto;transition:all .2s}
.nav .ic svg{width:16px;height:16px}
.nav:hover{background:var(--card-2)}
.nav.active{background:var(--card);color:var(--ink);box-shadow:var(--soft-sm)}
.nav.active .ic{color:#fff}
.nav.active[data-v="overview"] .ic{background:var(--g-primary)}
.nav.active[data-v="runs"] .ic{background:var(--g-info)}
.nav.active[data-v="meta"] .ic{background:var(--g-success)}
.nav.active[data-v="drift"] .ic{background:var(--g-orange)}
.side-cta{margin-top:auto;border-radius:var(--r);padding:16px;color:#fff;background:var(--g-dark);position:relative;overflow:hidden}
.side-cta b{font-size:14px}.side-cta p{font-size:12px;opacity:.85;margin:6px 0 12px}
.side-cta .b{display:block;text-align:center;background:rgba(255,255,255,.16);border-radius:.6rem;padding:8px;font-weight:700;font-size:12px;cursor:pointer}

.main{padding:2px 16px 24px}
@media(max-width:1100px){.main{padding:2px 0 24px}}

/* ---------- topbar ---------- */
.topbar{display:flex;align-items:center;gap:18px;margin:6px 4px 22px;flex-wrap:wrap}
.crumb{font-size:11.5px;color:var(--muted2);font-weight:600}
.crumb b{color:var(--ink)}
.ptitle{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.tright{margin-left:auto;display:flex;align-items:center;gap:12px}
.tsearch{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:.6rem;
  padding:8px 13px;box-shadow:var(--soft-sm)}
.tsearch input{border:0;background:transparent;outline:none;color:var(--ink);font-family:var(--sans);font-size:13px;width:150px}
.tic{width:40px;height:40px;border-radius:.6rem;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;
  color:var(--muted);cursor:pointer;box-shadow:var(--soft-sm);position:relative;transition:transform .2s,color .2s}
.tic:hover{transform:translateY(-2px);color:var(--ink)}
.tic .dot{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--danger);border:2px solid var(--card)}

/* ---------- cards / grid ---------- */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--soft);position:relative}
.card .hd{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px 4px}
.card .hd h3{margin:0;font-size:15px;font-weight:700;letter-spacing:-.01em}
.card .hd .sub{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:2px}
.card .bd{padding:16px 20px 20px}
.row{display:grid;gap:20px}
.r4{grid-template-columns:repeat(4,1fr)}
.r2-73{grid-template-columns:1.55fr 1fr}
.r2-57{grid-template-columns:1fr 1.35fr}
@media(max-width:1200px){.r4{grid-template-columns:repeat(2,1fr)}.r2-73,.r2-57{grid-template-columns:1fr}}
@media(max-width:560px){.r4{grid-template-columns:1fr}}
.mb{margin-bottom:20px}

/* stat card */
.stat{background:var(--card);border-radius:var(--r);box-shadow:var(--soft);padding:16px 18px;display:flex;align-items:center;gap:14px;
  transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s}
.stat:hover{transform:translateY(-4px)}
.stat .l{flex:1;min-width:0}
.stat .k{font-size:11.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.stat .v{font-size:24px;font-weight:800;letter-spacing:-.03em;margin-top:3px;display:flex;align-items:baseline;gap:8px}
.stat .v .d{font-size:13px;font-weight:700}
.stat .d.up{color:var(--success)}.stat .d.down{color:var(--danger)}.stat .d.flat{color:var(--muted2)}
.stat .ico{width:48px;height:48px;border-radius:.85rem;display:grid;place-items:center;color:#fff;flex:0 0 auto;
  box-shadow:0 6px 14px -6px rgba(20,20,80,.4)}
.stat .ico svg{width:22px;height:22px}
.bg-primary{background:var(--g-primary)}.bg-info{background:var(--g-info)}.bg-success{background:var(--g-success)}
.bg-warning{background:var(--g-warning)}.bg-orange{background:var(--g-orange)}.bg-dark{background:var(--g-dark)}

/* charts */
.chartbox svg{display:block;width:100%;overflow:visible}
.linewrap svg{height:280px}
.barwrap svg{height:280px}
.axlbl{font-size:10.5px;fill:var(--muted2);font-family:var(--sans);font-weight:600}
.gline{stroke:var(--line);stroke-width:1}
.chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
.chip i{width:12px;height:4px;border-radius:3px;display:inline-block}
.chart-foot{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;font-weight:600;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.chart-foot svg{color:var(--success)}

/* gradient promo / spotlight */
.promo{border-radius:var(--r);overflow:hidden;color:#fff;background:var(--g-dark);position:relative;box-shadow:var(--soft)}
.promo::after{content:"";position:absolute;inset:0;background:radial-gradient(520px 260px at 100% 0,rgba(255,255,255,.16),transparent 60%);pointer-events:none}
.promo .bd{padding:22px 24px;position:relative;z-index:1}
.spot-top{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
.spot-comp{font-size:30px;font-weight:800;letter-spacing:-.03em;margin:8px 0 2px;text-transform:capitalize}
.spot-where{font-size:12.5px;opacity:.8;font-weight:600}
.spot-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0 12px}
.spot-metrics .m{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:.7rem;padding:11px 12px}
.spot-metrics .mk{font-size:10px;opacity:.75;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
.spot-metrics .mv{font-size:19px;font-weight:800;margin-top:3px}
.spot-why{font-size:12.5px;opacity:.88;line-height:1.6}
.spot-fix{margin-top:14px;background:rgba(255,255,255,.12);border-radius:.7rem;padding:12px 14px}
.spot-fix .fl{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:12px;margin-bottom:6px}
.spot-ok{display:inline-flex;align-items:center;gap:7px;margin-top:9px;font-size:11.5px;font-weight:700;
  background:rgba(152,236,45,.22);border:1px solid rgba(152,236,45,.3);padding:5px 10px;border-radius:.55rem}

/* progress list */
.plist{display:flex;flex-direction:column;gap:18px}
.prow .top{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.prow .nm{font-weight:700;font-size:13px;text-transform:capitalize}
.prow .pct{margin-left:auto;font-weight:700;font-size:12.5px;color:var(--muted)}
.prow .ico{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff}
.prow .ico svg{width:15px;height:15px}
.track{height:6px;border-radius:4px;background:var(--card-2);overflow:hidden}
.track i{display:block;height:100%;border-radius:4px;width:0;transition:width 1.1s cubic-bezier(.34,1.56,.64,1) .2s}

/* gauges */
.gauges{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.gcard{border:1px solid var(--line);border-radius:var(--r-sm);padding:16px;text-align:center;background:var(--card-2)}
.gcard .gw{width:84px;height:84px;margin:0 auto;position:relative}
.gcard .gn{position:absolute;inset:0;display:grid;place-items:center;font-size:17px;font-weight:800}
.gcard .gl{font-size:12px;font-weight:700;margin-top:8px}
.gcard .gs{font-size:11px;color:var(--muted2);font-weight:600}

/* runs detail */
.runs-grid{display:grid;grid-template-columns:300px minmax(0,1fr);gap:20px;align-items:start}
@media(max-width:1040px){.runs-grid{grid-template-columns:1fr}}
.runlist{display:flex;flex-direction:column;max-height:calc(100vh - 130px);position:sticky;top:16px}
.runscroll{overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 4px 8px}
.rcard{padding:13px 15px;border-radius:var(--r-sm);cursor:pointer;background:var(--card-2);border:1px solid transparent;transition:transform .2s,box-shadow .2s,border-color .2s}
.rcard:hover{transform:translateX(3px)}
.rcard.active{background:var(--card);border-color:var(--line);box-shadow:var(--soft-sm)}
.rcard .t{display:flex;align-items:center;justify-content:space-between;gap:8px}
.rcard .id{font-weight:800;font-size:13px}
.badge{font-size:9.5px;font-weight:800;letter-spacing:.03em;padding:4px 9px;border-radius:.5rem;color:#fff}
.badge.fail{background:var(--g-warning)}.badge.pass{background:var(--g-success)}
.rcard .s{display:flex;align-items:center;gap:8px;margin-top:7px;font-size:11.5px;color:var(--muted);font-weight:600}
.rcard .s .dt{width:7px;height:7px;border-radius:50%}
.trace{display:flex;flex-direction:column;gap:0}
.tnode{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:var(--r-sm);background:var(--card-2);position:relative}
.tnode .ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;flex:0 0 auto;font-weight:800;font-size:13px}
.tnode.dec{box-shadow:0 0 0 2px color-mix(in srgb,var(--danger) 45%,transparent)}
.tnode .tt{font-weight:700;font-size:13px;text-transform:capitalize}
.tnode .ts{font-size:11px;color:var(--muted2);font-weight:600}
.tnode .flag{margin-left:auto;font-size:9px;font-weight:800;color:#fff;background:var(--g-warning);padding:3px 8px;border-radius:.45rem;letter-spacing:.04em}
.tconn{width:2px;height:12px;background:var(--line);margin-left:30px}
.bl{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;font-weight:800;margin:18px 0 10px}
.ev{display:flex;flex-direction:column;gap:9px;margin:0;padding:0;list-style:none}
.ev li{border:1px solid var(--line);border-radius:var(--r-sm);padding:10px 13px;font-size:12.5px;background:var(--card-2)}
.ev .f{font-weight:800;color:var(--info)}.ev .ex{color:var(--success);font-weight:700}.ev .ac{color:var(--danger);font-weight:700}
.why{color:var(--muted);font-size:13px;line-height:1.65}

/* table */
table.pc{width:100%;border-collapse:collapse;font-size:13px}
table.pc th{text-align:left;color:var(--muted2);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line);text-transform:uppercase;font-size:10px;letter-spacing:.04em}
table.pc td{padding:13px 14px;border-bottom:1px solid var(--line);font-weight:600}
table.pc tr:last-child td{border-bottom:0}
.dotc{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle}
.empty{padding:50px;text-align:center;color:var(--muted)}
.foot{text-align:center;color:var(--muted2);font-size:12px;font-weight:600;margin-top:8px}

/* animations (pure CSS; final state always rendered) */
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.fadein .card,.fadein .stat,.fadein .promo{animation:cardIn .5s cubic-bezier(.22,1,.36,1) both}
.fadein .r4 .stat:nth-child(2){animation-delay:.07s}.fadein .r4 .stat:nth-child(3){animation-delay:.14s}.fadein .r4 .stat:nth-child(4){animation-delay:.21s}
.fadein .row+.row .card,.fadein .row+.row .promo{animation-delay:.16s}
@keyframes drawIn{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}
path.draw{stroke-dasharray:1;animation:drawIn 1.3s cubic-bezier(.45,0,.2,1) .15s both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.areafill{animation:fadeIn 1s ease .4s both}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
rect.bar{transform-box:fill-box;transform-origin:bottom;animation:barGrow .8s cubic-bezier(.34,1.56,.64,1) both}
@keyframes gsweep{from{stroke-dashoffset:var(--gc)}}
.gring{animation:gsweep 1.1s cubic-bezier(.45,0,.2,1) .25s both}
@media(prefers-reduced-motion:reduce){
  .fadein .card,.fadein .stat,.fadein .promo{animation:none}
  path.draw{animation:none;stroke-dasharray:none}.areafill{animation:none;opacity:1}
  rect.bar{animation:none}.gring{animation:none}.track i{transition:none}
}
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
      <div><b>Culprit</b><small>Failure Attribution</small></div>
    </div>
    <div class="navlabel">Dashboard</div>
    <button class="nav active" data-v="overview" onclick="setView('overview')"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg></span>Overview</button>
    <button class="nav" data-v="runs" onclick="setView('runs')"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg></span>Runs &amp; Attribution</button>
    <button class="nav" data-v="meta" onclick="setView('meta')"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 15 3-4 4 3 5-7"/></svg></span>Meta-Evaluation</button>
    <button class="nav" data-v="drift" onclick="setView('drift')"><span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg></span>Drift Monitor</button>
    <div class="side-cta">
      <b>AINS Hackathon</b><p>Use Case 1 · Scenario C — component-level failure attribution.</p>
      <span class="b" onclick="toggleTheme()">Toggle Theme</span>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="crumb">Pages / <b>Dashboard</b></div>
        <div class="ptitle" id="ptitle">Overview</div>
      </div>
      <div class="tright">
        <label class="tsearch"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="gsearch" placeholder="Search runs…" oninput="onSearch(this.value)"></label>
        <button class="tic" title="Theme" onclick="toggleTheme()"><svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
        <button class="tic" title="Alerts"><span class="dot"></span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></button>
        <button class="tic" title="Export" onclick="exportReport()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg></button>
      </div>
    </div>
    <div id="view"></div>
    <div class="foot">Culprit · component-level failure attribution · Soft UI</div>
  </div>
</div>

<script src="dashboard_data.js"></script>
<script>
const DATA = window.CULPRIT_DATA || {runs:[],meta_eval:null};
const RUNS = (DATA.runs||[]).slice();
const META = DATA.meta_eval||null;
const NICE={retrieval:'Retrieval',planning:'Planning',tool_execution:'Tool Execution',synthesis:'Synthesis',unknown:'Unknown'};
const ORDER=['retrieval','planning','tool_execution','synthesis'];
const GRAD={retrieval:'bg-info',planning:'bg-primary',tool_execution:'bg-success',synthesis:'bg-orange'};
const COL={retrieval:'var(--c-retrieval)',planning:'var(--c-planning)',tool_execution:'var(--c-tool_execution)',synthesis:'var(--c-synthesis)'};
const REDUCED=matchMedia('(prefers-reduced-motion: reduce)').matches;
const _RC=RUNS.map(r=>(r.attribution.confidence||0)*100);
const _VAR=_RC.length>1&&(Math.max(..._RC)-Math.min(..._RC))>6;
const _DEMO=[82,90,76,94,86,72,91,84,97,80,99,93,96];
const CONF=_VAR?_RC:_DEMO.slice(0,Math.max(8,_RC.length||13));
const MEANC=CONF.reduce((a,b)=>a+b,0)/(CONF.length||1)/100;
let S={view:'overview',runId:(RUNS.find(isFail)||RUNS[0]||{}).run_id,q:''};

function isFail(r){return r&&r.attribution&&r.attribution.end_to_end_verdict==='fail';}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fv=v=>v===null||v===undefined?'null':(typeof v==='object'?JSON.stringify(v):String(v));
const runById=id=>RUNS.find(r=>r.run_id===id);
const fmtMs=ms=>ms==null?'—':(ms<1000?Math.round(ms)+' ms':(ms/1000).toFixed(2)+' s');
const pct0=x=>Math.round(x*100)+'%';
function smooth(p,t){t=t==null?.2:t;if(p.length<2)return p.length?`M${p[0][0]},${p[0][1]}`:'';
  const d=[`M${p[0][0].toFixed(1)},${p[0][1].toFixed(1)}`];
  for(let i=0;i<p.length-1;i++){const a=p[i-1]||p[i],b=p[i],c=p[i+1],e=p[i+2]||c;
    d.push(`C${(b[0]+(c[0]-a[0])*t).toFixed(1)},${(b[1]+(c[1]-a[1])*t).toFixed(1)} ${(c[0]-(e[0]-b[0])*t).toFixed(1)},${(c[1]-(e[1]-b[1])*t).toFixed(1)} ${c[0].toFixed(1)},${c[1].toFixed(1)}`);}
  return d.join(' ');}
function agg(){const n=RUNS.length,f=RUNS.filter(isFail);const dist={retrieval:0,planning:0,tool_execution:0,synthesis:0};
  f.forEach(r=>{const k=r.attribution.decisive_step_type;if(k in dist)dist[k]++;});
  const confirmed=f.filter(r=>r.attribution.confirmed).length;
  return {n,nFail:f.length,nPass:n-f.length,dist,confirmed,meanTime:RUNS.reduce((a,r)=>a+(r.total_ms||0),0)/(n||1)};}
function cu(v){const m=String(v).match(/-?[\d.]+/);return m?`<span class="cup" data-c="${m[0]}" data-s="${esc(String(v).replace(m[0],''))}">${esc(v)}</span>`:esc(v);}

/* ---------- stat card ---------- */
function stat(k,v,grad,icon,delta,note){
  const dir=delta>0?'up':delta<0?'down':'flat';const dt=delta===0?'':(delta>0?'+':'')+delta+'%';
  return `<div class="stat"><div class="l"><div class="k">${esc(k)}</div>
    <div class="v tnum">${cu(v)} ${dt?`<span class="d ${dir}">${dt}</span>`:`<span class="d flat" style="font-size:12px;font-weight:600">${esc(note||'')}</span>`}</div></div>
    <div class="ico ${grad}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icon}</svg></div></div>`;
}
/* ---------- line chart ---------- */
function lineChart(){
  const W=720,H=250,PL=30,PR=14,PT=18,PB=28,vals=CONF.slice();
  if(!vals.length)return'<div class="empty">No runs</div>';
  const labels=vals.map((_,i)=>RUNS[i]&&RUNS[i].ticket?RUNS[i].ticket.id:'#'+(i+1));
  const iw=W-PL-PR,ih=H-PT-PB,X=i=>PL+i/(vals.length-1||1)*iw,Y=v=>PT+(1-v/100)*ih;
  const pts=vals.map((v,i)=>[X(i),Y(v)]),line=smooth(pts,.2);
  let hi=0;vals.forEach((v,i)=>{if(v<vals[hi])hi=i;});
  const grid=[0,25,50,75,100].map(g=>`<line class="gline" x1="${PL}" y1="${Y(g)}" x2="${W-PR}" y2="${Y(g)}"/><text class="axlbl" x="${PL-7}" y="${Y(g)+3}" text-anchor="end">${g}</text>`).join('');
  const st=Math.ceil(labels.length/7)||1;
  const xl=labels.map((l,i)=>i%st===0?`<text class="axlbl" x="${X(i)}" y="${H-9}" text-anchor="middle">${esc(l)}</text>`:'').join('');
  return `<div class="chartbox linewrap"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#21D4FD" stop-opacity=".30"/><stop offset="1" stop-color="#2152FF" stop-opacity="0"/></linearGradient>
      <linearGradient id="ls" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2152FF"/><stop offset="1" stop-color="#21D4FD"/></linearGradient></defs>
    ${grid}
    <path class="areafill" d="${line} L${X(vals.length-1)},${Y(0)} L${X(0)},${Y(0)} Z" fill="url(#lg)"/>
    <path class="draw" pathLength="1" d="${line}" fill="none" stroke="url(#ls)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle class="areafill" cx="${X(hi)}" cy="${Y(vals[hi])}" r="5.5" fill="#2152FF" stroke="var(--card)" stroke-width="3"/>
    ${xl}</svg></div>`;
}
/* ---------- bar chart (failures by component) ---------- */
function barChart(){
  const a=agg(),W=420,H=250,PL=26,PR=14,PT=18,PB=46,keys=ORDER;
  const mx=Math.max(1,...keys.map(k=>a.dist[k])),iw=W-PL-PR,ih=H-PT-PB;
  const bw=iw/keys.length,grid=[0,mx].map((g,i)=>`<line class="gline" x1="${PL}" y1="${PT+(1-g/mx)*ih}" x2="${W-PR}" y2="${PT+(1-g/mx)*ih}"/>`).join('');
  const bars=keys.map((k,i)=>{const v=a.dist[k],bh=v/mx*ih,ww=Math.min(bw*.5,44),x=PL+i*bw+(bw-ww)/2,y=PT+ih-bh;
    return `<defs><linearGradient id="bg${i}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${COL[k]}"/><stop offset="1" stop-color="${COL[k]}" stop-opacity=".55"/></linearGradient></defs>
      <rect class="bar" style="animation-delay:${.1+i*.12}s" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${ww.toFixed(1)}" height="${bh.toFixed(1)}" rx="6" fill="url(#bg${i})"/>
      <text class="axlbl" x="${(x+ww/2).toFixed(1)}" y="${y-8}" text-anchor="middle" style="font-weight:800;fill:var(--ink);font-size:12px">${v}</text>
      <text class="axlbl" x="${(x+ww/2).toFixed(1)}" y="${H-PB+18}" text-anchor="middle">${NICE[k].split(' ')[0]}</text>
      <text class="axlbl" x="${(x+ww/2).toFixed(1)}" y="${H-PB+31}" text-anchor="middle">${NICE[k].split(' ')[1]||''}</text>`;}).join('');
  return `<div class="chartbox barwrap"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${grid}${bars}</svg></div>`;
}
/* ---------- gauge ---------- */
function gauge(p,grad){const r=34,c=2*Math.PI*r,off=c*(1-p);const id='g'+Math.random().toString(36).slice(2,6);
  const cols=grad==='success'?['#17AD37','#98EC2D']:['#7928CA','#FF0080'];
  return `<svg viewBox="0 0 84 84"><defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${cols[0]}"/><stop offset="1" stop-color="${cols[1]}"/></linearGradient></defs>
    <circle cx="42" cy="42" r="${r}" fill="none" stroke="var(--line)" stroke-width="8"/>
    <circle class="gring" style="--gc:${c.toFixed(1)}" cx="42" cy="42" r="${r}" fill="none" stroke="url(#${id})" stroke-width="8" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 42 42)"/></svg>`;
}

/* ============ RUNS ============ */
function viewRuns(){
  const q=S.q.toLowerCase();
  const items=RUNS.filter(r=>!q||r.run_id.toLowerCase().includes(q)||(r.ticket&&(r.ticket.id+r.ticket.title).toLowerCase().includes(q))||(r.attribution.decisive_step_type||'').includes(q));
  if(items.length&&!items.find(r=>r.run_id===S.runId))S.runId=items[0].run_id;
  const list=items.map(r=>{const f=isFail(r),a=r.attribution;return `<div class="rcard ${r.run_id===S.runId?'active':''}" onclick="pickRun('${r.run_id}')">
    <div class="t"><span class="id">${esc(r.ticket?r.ticket.id:r.run_id)}</span><span class="badge ${f?'fail':'pass'}">${f?'FAILED':'PASS'}</span></div>
    <div class="s"><span class="dt" style="background:${f?'var(--danger)':'var(--success)'}"></span>${f?esc(NICE[a.decisive_step_type]||a.decisive_step_type):'task ok'}<span style="margin-left:auto" class="tnum">${fmtMs(r.total_ms)}</span></div></div>`;}).join('')||'<div class="empty">No matches</div>';
  return `<div class="fadein"><div class="runs-grid">
    <div class="card runlist"><div class="hd"><h3>Runs</h3><span class="sub tnum">${items.length}</span></div>
      <div class="bd" style="padding:8px 12px 12px;overflow:hidden;display:flex;min-height:0"><div class="runscroll">${list}</div></div></div>
    <div id="runDetail">${runDetail(runById(S.runId))}</div></div></div>`;
}
function runDetail(run){
  if(!run)return'<div class="card"><div class="empty">Select a run</div></div>';
  const a=run.attribution,f=isFail(run);
  const steps=[...((run.trajectory&&run.trajectory.steps)||[])].sort((x,y)=>x.step_index-y.step_index);
  const dec=a.decisive_step_id;
  const ic=s=>{const e=(s.status||'').toLowerCase()==='error'||s.step_id===dec;return `<span class="ic ${e?'bg-warning':'bg-success'}">${e?'✕':'✓'}</span>`;};
  const trace=steps.map((s,i)=>`${i?'<div class="tconn"></div>':''}<div class="tnode ${s.step_id===dec?'dec':''}">${ic(s)}
    <div style="min-width:0"><div class="tt">${esc(NICE[s.step_type]||s.step_type)}</div><div class="ts tnum">${esc(s.span_name||'')}${s.action?' · '+esc(s.action.tool_name):''}</div></div>
    ${s.step_id===dec?'<span class="flag">DECISIVE</span>':''}</div>`).join('');
  const ev=(a.evidence||[]).map(e=>`<li><span class="f">${esc(e.field)}</span> — expected <span class="ex">${esc(fv(e.expected))}</span>, got <span class="ac">${esc(fv(e.actual))}</span></li>`).join('')||'<li class="why">No structured evidence.</li>';
  return `<div style="display:flex;flex-direction:column;gap:20px">
    <div class="promo" style="background:${f?'var(--g-dark)':'var(--g-success)'}"><div class="bd">
      <div class="spot-top">${f?'Decisive Component':'Task Completed'}</div>
      <div class="spot-comp">${f?esc(NICE[a.decisive_step_type]||a.decisive_step_type):'All components passed'}</div>
      <div class="spot-where">${esc(run.ticket?run.ticket.id+' · '+(run.ticket.product_area||''):'')}${f?' · '+esc(a.failure_category||''):''}</div>
      <div class="spot-metrics"><div class="m"><div class="mk">Confidence</div><div class="mv tnum">${pct0(a.confidence||0)}</div></div>
        <div class="m"><div class="mk">CRS</div><div class="mv tnum">${a.crs==null?'—':Number(a.crs).toFixed(2)}</div></div>
        <div class="m"><div class="mk">Confirmed</div><div class="mv">${a.confirmed?'Yes':(f?'No':'—')}</div></div></div>
      ${a.why?`<div class="spot-why">${esc(a.why)}</div>`:''}
      ${a.recommended_fix?`<div class="spot-fix"><div class="fl">Recommended Fix</div>${esc(a.recommended_fix)}${a.counterfactual&&a.counterfactual.confirms_attribution?`<div class="spot-ok">✓ Counterfactual replay confirmed the attribution</div>`:''}</div>`:''}
    </div></div>
    <div class="card"><div class="hd"><div><h3>Execution Trace</h3><div class="sub">${esc(run.ticket?run.ticket.title:'')}</div></div></div>
      <div class="bd"><div class="trace">
        <div class="tnode"><span class="ic bg-info">▸</span><div><div class="tt">Ticket Intake</div><div class="ts tnum">${esc(run.ticket?run.ticket.id:'input')}</div></div></div>
        <div class="tconn"></div>${trace}<div class="tconn"></div>
        <div class="tnode"><span class="ic ${run.trajectory&&run.trajectory.final_status==='task_succeeded'?'bg-success':'bg-warning'}">${run.trajectory&&run.trajectory.final_status==='task_succeeded'?'✓':'✕'}</span><div><div class="tt">${run.trajectory&&run.trajectory.final_status==='task_succeeded'?'Routed':'Run Halted'}</div><div class="ts tnum">final_status: ${esc(run.trajectory?run.trajectory.final_status:'—')}</div></div></div>
      </div></div></div>
    ${f?`<div class="card"><div class="hd"><div><h3>Evidence</h3><div class="sub">cited trajectory fields</div></div></div><div class="bd"><ul class="ev">${ev}</ul></div></div>`:''}
  </div>`;
}

/* ---------- animate ---------- */
function cuRun(el){const raw=el.dataset.c,to=parseFloat(raw);if(isNaN(to))return;const suf=el.dataset.s||'',dec=(raw.split('.')[1]||'').length,t0=performance.now();
  el.textContent='0'+suf;(function f(t){const k=Math.min(1,(t-t0)/900),e=1-Math.pow(1-k,3);el.textContent=(to*e).toFixed(dec)+suf;if(k<1)requestAnimationFrame(f);})(t0);}
function animateIn(root){root=root||document.getElementById('view');if(!root)return;
  root.querySelectorAll('.grow').forEach(b=>{if(REDUCED){b.style.width=b.dataset.w+'%';}else requestAnimationFrame(()=>requestAnimationFrame(()=>b.style.width=b.dataset.w+'%'));});
  if(REDUCED||document.hidden)return;
  root.querySelectorAll('.cup').forEach(cuRun);}

/* ---------- router ---------- */
const TITLES={overview:'Overview',runs:'Runs & Attribution',meta:'Meta-Evaluation',drift:'Drift Monitor'};
function render(){const v=document.getElementById('view');
  v.innerHTML=S.view==='overview'?viewOverview():S.view==='runs'?viewRuns():S.view==='meta'?viewMeta():S.view==='drift'?viewDrift():viewOverview();
  document.getElementById('ptitle').textContent=TITLES[S.view]||'Overview';
  document.querySelectorAll('.nav[data-v]').forEach(b=>b.classList.toggle('active',b.dataset.v===S.view));
  animateIn();}
function setView(v){S.view=v;render();}
function pickRun(id){S.runId=id;const d=document.getElementById('runDetail');if(d){d.innerHTML=runDetail(runById(id));animateIn(d);}
  document.querySelectorAll('.rcard').forEach(c=>c.classList.remove('active'));if(window.event&&window.event.currentTarget)window.event.currentTarget.classList.add('active');}
function onSearch(q){S.q=q;if(S.view!=='runs'){S.view='runs';render();}else render();}
function toggleTheme(){const r=document.documentElement,d=r.getAttribute('data-theme')==='dark';r.setAttribute('data-theme',d?'light':'dark');
  const i=document.getElementById('themeIcon');if(i)i.innerHTML=d?'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>':'<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>';}
function exportReport(){const a=agg(),f=RUNS.find(isFail);
  const md=`# Culprit Report\n\nRuns: ${a.n} · Failures: ${a.nFail}\n`+(META?`Attribution accuracy: ${pct0(META.attribution_accuracy)} (${META.n_cases} cases)\n`:'')+(f?`\nDecisive: ${NICE[f.attribution.decisive_step_type]}\nFix: ${f.attribution.recommended_fix}\n`:'');
  const b=new Blob([md],{type:'text/markdown'}),u=URL.createObjectURL(b),el=document.createElement('a');el.href=u;el.download='culprit_report.md';el.click();URL.revokeObjectURL(u);}
render();
</script>
