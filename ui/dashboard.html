<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'">
<title>Culprit — Failure Attribution</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root[data-theme="dark"]{
  --bg0:#08090C; --bg1:#0F1115; --panel:#13151B; --panel2:#16181F; --raised:#1B1E26;
  --border:rgba(255,255,255,.07); --border-soft:rgba(255,255,255,.045); --hair:rgba(255,255,255,.04);
  --text:#ECEEF2; --muted:#8B92A5; --muted2:#5C6473;
  --glass:#0E1014CC;
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 12px 28px -20px rgba(0,0,0,.7);
  --shadow-sm:0 1px 0 rgba(255,255,255,.025) inset, 0 4px 14px -10px rgba(0,0,0,.55);
  --grid:rgba(255,255,255,.045);
  --wash:
    radial-gradient(1200px 800px at 92% -10%, rgba(124,92,255,.32), transparent 55%),
    radial-gradient(1000px 700px at -8% 115%, rgba(76,154,255,.16), transparent 60%);
}
:root[data-theme="light"]{
  --bg0:#FAFAFB; --bg1:#FFFFFF; --panel:#FFFFFF; --panel2:#F7F8FA; --raised:#FFFFFF;
  --border:rgba(15,23,42,.08); --border-soft:rgba(15,23,42,.05); --hair:rgba(15,23,42,.04);
  --text:#0F172A; --muted:#475569; --muted2:#64748B;
  --glass:#FFFFFFE6;
  --shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 8px 24px -18px rgba(15,23,42,.18);
  --shadow-sm:0 1px 0 rgba(255,255,255,.6) inset, 0 3px 10px -8px rgba(15,23,42,.12);
  --grid:rgba(15,23,42,.055);
  --wash:
    radial-gradient(900px 600px at 95% -6%, rgba(213,197,255,.60), transparent 60%),
    radial-gradient(800px 500px at -8% 115%, rgba(199,210,254,.45), transparent 65%);
}
:root{
  --accent:#7C5CFF; --accent2:#9F7AEA;
  --green:#22C55E; --green-d:rgba(34,197,94,.12); --red:#F0444C; --red-d:rgba(240,68,76,.12); --amber:#F59E0B; --slate:#64748B;
  --c-retrieval:#4C9AFF; --c-planning:#9F7AEA; --c-tool_execution:#2DD4BF; --c-synthesis:#F59E0B;
  --mono:'JetBrains Mono',ui-monospace,SF Mono,Menlo,Consolas,monospace;
  --sans:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --serif:'Instrument Serif',ui-serif,Georgia,'Times New Roman',serif;
  --r:14px; --r-sm:10px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg0); color:var(--text); font-family:var(--sans); font-size:13.5px; line-height:1.55;
  font-feature-settings:"ss01","cv11"; letter-spacing:-0.005em;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; overflow-x:hidden}

/* ---- aesthetic backdrop: lilac spotlight + faint grid (inspired by shadcn snippets) ---- */
.bg{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none;background:var(--wash)}
.bg .orb{display:none}
.bg .grain{position:absolute;inset:0;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse 90% 60% at 50% -5%,#000 25%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 90% 60% at 50% -5%,#000 25%,transparent 80%)}

::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--border-soft)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.hide{display:none!important}

/* topbar */
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:24px;
  padding:12px 22px;background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:12px}
.brand .logo{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;
  background:#15161C;border:1px solid var(--border);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.brand .logo::after{content:"";position:absolute;width:30px;height:30px;border-radius:8px;
  background:radial-gradient(60% 60% at 50% 0%,rgba(124,92,255,.35),transparent 70%);pointer-events:none}
.brand .logo{position:relative;overflow:hidden}
.brand-text{display:flex;flex-direction:column;line-height:1.1}
.brand h1{margin:0;font-size:14px;font-weight:600;letter-spacing:-0.015em;line-height:1.15}
.brand .sub{font-size:10.5px;color:var(--muted2);margin-top:2px;letter-spacing:0;font-weight:500}
.brand-underline{display:block;width:56px;height:6px;margin:1px 0 0;color:var(--accent);overflow:visible;pointer-events:none}
.brand-underline path{stroke:currentColor;stroke-width:1.4;fill:none;stroke-linecap:round;opacity:.95;
  filter:drop-shadow(0 0 5px color-mix(in srgb,var(--accent) 70%,transparent));
  stroke-dasharray:140;stroke-dashoffset:140;animation:drawUnder 1.3s .25s cubic-bezier(.5,.05,.2,1) forwards}
@keyframes drawUnder{to{stroke-dashoffset:0}}
.brand{cursor:default}
.nav{display:flex;gap:2px;margin:0 auto;padding:3px;background:var(--panel2);border:1px solid var(--border);border-radius:10px}
.nav button{background:transparent;border:0;color:var(--muted);font-family:var(--sans);font-size:12.5px;
  font-weight:500;padding:6px 13px;border-radius:7px;cursor:pointer;position:relative;transition:color .15s,background .15s;letter-spacing:-0.005em}
.nav button:hover{color:var(--text)}
.nav button.active{color:var(--text);background:var(--raised);box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 1px 2px rgba(0,0,0,.2)}
.tools{display:flex;align-items:center;gap:8px}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--panel);
  display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:color .15s,border-color .15s,background .15s}
.icon-btn:hover{color:var(--text);background:var(--panel2)}
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--panel);
  color:var(--text);font-family:var(--sans);font-weight:500;font-size:12.5px;padding:7px 13px;border-radius:8px;
  cursor:pointer;transition:background .15s,border-color .15s,color .15s;letter-spacing:-0.005em}
.btn:hover{background:var(--panel2);border-color:var(--border)}
.btn.primary{background:var(--text);border:0;color:var(--bg0);font-weight:600;
  box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 1px 2px rgba(0,0,0,.15)}
.btn.primary:hover{background:color-mix(in srgb,var(--text) 92%,transparent);opacity:.95}

/* view entrance — subtle fade only */
#view{animation:none}
#view.anim{animation:viewIn .28s ease-out both}
@keyframes viewIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* layout */
.runs-view{display:grid;grid-template-columns:280px minmax(0,1fr);gap:14px;padding:18px 22px 28px;align-items:start}
@media(max-width:1080px){.runs-view{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow-sm);
  transition:border-color .15s ease;position:relative}
.card:hover{border-color:color-mix(in srgb,var(--text) 10%,var(--border))}
.card .hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.card .hd h3{margin:0;font-size:11.5px;font-weight:600;letter-spacing:0;color:var(--muted);text-transform:none}
.card .bd{padding:0 16px 16px}

/* run list */
.runlist{position:sticky;top:70px;display:flex;flex-direction:column;max-height:calc(100vh - 88px)}
.search{display:flex;align-items:center;gap:8px;margin:0 12px 8px;padding:7px 11px;border:1px solid var(--border);
  border-radius:8px;background:var(--panel2)}
.search input{border:0;background:transparent;color:var(--text);font-family:var(--sans);font-size:12.5px;width:100%;outline:none}
.runscroll{overflow-y:auto;padding:0 8px 10px;display:flex;flex-direction:column;gap:2px}
.run-card{padding:10px 12px;border-radius:8px;border:1px solid transparent;cursor:pointer;background:transparent;
  transition:background .12s ease;position:relative}
.run-card:hover{background:var(--panel2)}
.run-card.active{background:var(--panel2);border-color:var(--border)}
.run-card.active::before{content:"";position:absolute;left:-1px;top:8px;bottom:8px;width:2px;background:var(--accent);border-radius:2px}
.run-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.run-id{font-family:var(--mono);font-size:12px;font-weight:500;letter-spacing:-0.01em;color:var(--text)}
.badge{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.04em;padding:2px 7px;border-radius:5px;font-variant-numeric:tabular-nums}
.badge.fail{background:color-mix(in srgb,var(--red) 14%,transparent);color:#ff9aa3;border:1px solid color-mix(in srgb,var(--red) 22%,transparent)}
.badge.pass{background:color-mix(in srgb,var(--green) 12%,transparent);color:#86efac;border:1px solid color-mix(in srgb,var(--green) 22%,transparent)}
.run-sub{display:flex;align-items:center;gap:8px;margin-top:5px;color:var(--muted2);font-size:11px;font-family:var(--mono);font-variant-numeric:tabular-nums}
.run-sub .dot{width:6px;height:6px;border-radius:50%}
.pager{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0 2px;color:var(--muted2);font-size:11px;font-family:var(--mono);font-variant-numeric:tabular-nums;border-top:1px solid var(--hair);margin-top:6px}

/* run main */
.run-head{display:flex;align-items:center;justify-content:space-between;gap:14px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.run-head .l{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.run-head .title{font-size:17px;font-weight:600;letter-spacing:-0.015em}
.run-head .meta{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:12px;font-family:var(--mono);font-variant-numeric:tabular-nums}
.run-head .meta span{display:inline-flex;align-items:center;gap:6px}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.04em;padding:3px 9px;border-radius:5px;font-variant-numeric:tabular-nums}
.pill.fail{background:color-mix(in srgb,var(--red) 14%,transparent);color:#ff9aa3;border:1px solid color-mix(in srgb,var(--red) 22%,transparent)}
.pill.pass{background:color-mix(in srgb,var(--green) 12%,transparent);color:#86efac;border:1px solid color-mix(in srgb,var(--green) 22%,transparent)}

.run-grid{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:16px}
@media(max-width:1320px){.run-grid{grid-template-columns:1fr}}
.col{display:flex;flex-direction:column;gap:16px}

/* DAG */
.legend{display:flex;flex-wrap:wrap;gap:12px}
.legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.legend i{width:8px;height:8px;border-radius:2px}
.dag{display:flex;flex-direction:column;align-items:center;gap:0;padding:4px 0}
.dnode{width:min(340px,100%);background:var(--raised);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.dnode:hover{border-color:color-mix(in srgb,var(--text) 15%,var(--border));background:var(--panel2)}
.dnode.sel{border-color:color-mix(in srgb,var(--accent) 55%,var(--border));background:color-mix(in srgb,var(--accent) 5%,var(--raised))}
.dnode .accentbar{width:3px;align-self:stretch;border-radius:3px;background:var(--slate)}
.dnode.ok .accentbar{background:var(--green)} .dnode.err .accentbar{background:var(--red)} .dnode.warn .accentbar{background:var(--amber)}
.dnode .nmain{flex:1;min-width:0}
.dnode .ntitle{font-weight:600;font-size:13px;letter-spacing:-0.01em;text-transform:capitalize}
.dnode .nsub{font-family:var(--mono);font-size:10.5px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.dnode .nright{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-size:10.5px;color:var(--muted2);font-variant-numeric:tabular-nums}
.statedot{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;flex:0 0 auto;font-size:11px;font-weight:600}
.statedot.ok{background:color-mix(in srgb,var(--green) 14%,transparent);color:#86efac}
.statedot.err{background:color-mix(in srgb,var(--red) 14%,transparent);color:#ff9aa3}
.statedot.warn{background:color-mix(in srgb,var(--amber) 14%,transparent);color:#fcd34d}
.statedot.skip{background:color-mix(in srgb,var(--slate) 14%,transparent);color:#94a3b8}
.dnode.decisive{border-color:color-mix(in srgb,var(--red) 55%,var(--border));background:color-mix(in srgb,var(--red) 5%,var(--raised));box-shadow:0 0 0 1px color-mix(in srgb,var(--red) 22%,transparent)}
.dnode.decisive .accentbar{background:var(--red)}
.dec-tag{position:absolute;top:-7px;left:12px;font-family:var(--mono);font-size:8.5px;font-weight:600;letter-spacing:.08em;
  color:#fff;background:var(--red);padding:2px 7px;border-radius:4px}
.connector{width:1px;height:18px;background:var(--border);position:relative}
.connector::after{content:"";position:absolute;left:-2.5px;bottom:-1px;width:6px;height:6px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);transform:rotate(45deg)}

/* verdict / root cause */
.rootcause .topline{display:flex;align-items:center;gap:7px;color:var(--red);font-weight:600;font-size:11px;letter-spacing:.04em;text-transform:uppercase}
.rc-comp{font-size:22px;font-weight:600;letter-spacing:-0.02em;margin:6px 0 14px;text-transform:capitalize;line-height:1.15}
.rc-comp .where{font-family:var(--mono);font-size:12px;color:var(--muted2);font-weight:400;text-transform:none;letter-spacing:0;display:block;margin-top:2px}
.rc-metrics{display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:center;margin-bottom:6px;padding:12px 0;border-top:1px solid var(--hair);border-bottom:1px solid var(--hair)}
.rc-metrics .m .k{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.rc-metrics .m .v{font-size:22px;font-weight:600;font-family:var(--mono);margin-top:3px;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.tag{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10.5px;font-weight:500;padding:2px 7px;border-radius:5px;margin-top:5px;letter-spacing:0;font-variant-numeric:tabular-nums}
.tag.high{background:color-mix(in srgb,var(--red) 12%,transparent);color:#ff9aa3;border:1px solid color-mix(in srgb,var(--red) 18%,transparent)}
.tag.low{background:color-mix(in srgb,var(--green) 11%,transparent);color:#86efac;border:1px solid color-mix(in srgb,var(--green) 18%,transparent)}
.tag.mid{background:color-mix(in srgb,var(--amber) 12%,transparent);color:#fcd34d;border:1px solid color-mix(in srgb,var(--amber) 18%,transparent)}
.bl{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin:14px 0 7px}
.ev-list{margin:0;padding-left:16px;color:var(--text);font-size:13px;line-height:1.6}.ev-list li{margin:4px 0}
.why{color:var(--muted);font-size:13px;line-height:1.65}
.reco{margin-top:14px;border:1px solid var(--border);border-radius:10px;padding:12px 14px;background:var(--panel2)}
.reco .rl{display:flex;align-items:center;gap:7px;color:#86efac;font-weight:600;font-size:12px;margin-bottom:7px;letter-spacing:-0.005em}
.reco ul{margin:0;padding-left:16px;font-size:13px;color:var(--text);line-height:1.6}.reco li{margin:3px 0}
.edit{font-family:var(--mono);font-size:11.5px;margin-top:6px;font-variant-numeric:tabular-nums}
.edit .from{color:#ff9aa3;text-decoration:line-through;opacity:.85}.edit .to{color:#86efac;font-weight:500}.edit .ar{color:var(--muted2);margin:0 4px}
.outcome{display:inline-flex;align-items:center;gap:6px;margin-top:9px;font-family:var(--mono);font-size:11px;font-weight:500;color:#86efac;background:color-mix(in srgb,var(--green) 11%,transparent);padding:4px 9px;border-radius:5px;border:1px solid color-mix(in srgb,var(--green) 18%,transparent)}

/* overview */
.kv{display:grid;grid-template-columns:auto 1fr;gap:9px 14px}
.kv dt{color:var(--muted2);font-size:12px;font-weight:500}
.kv dd{margin:0;text-align:right;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:-0.005em}
.sphere{opacity:.35}

/* tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--hair);margin:0 0 12px}
.tabs button{background:0;border:0;color:var(--muted2);font-family:var(--sans);font-weight:500;font-size:12px;
  padding:8px 12px;cursor:pointer;border-bottom:1.5px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;letter-spacing:-0.005em}
.tabs button:hover{color:var(--text)}
.tabs button.active{color:var(--text);border-color:var(--text)}
.snippet-q{font-family:var(--mono);font-size:11.5px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--muted);word-break:break-word;line-height:1.5}
.res{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--hair);font-size:12.5px}
.res .n{font-family:var(--mono);color:var(--muted2);margin-right:8px;font-variant-numeric:tabular-nums}
.res .sc{font-family:var(--mono);font-size:11px;padding:2px 7px;border-radius:5px;font-variant-numeric:tabular-nums;font-weight:500}
.res .sc.lo{background:color-mix(in srgb,var(--red) 12%,transparent);color:#ff9aa3}
.res .sc.hi{background:color-mix(in srgb,var(--green) 11%,transparent);color:#86efac}
.code{background:#08090C;border:1px solid var(--border);border-radius:8px;padding:11px 12px;font-family:var(--mono);
  font-size:11px;color:#B7BCC9;white-space:pre-wrap;word-break:break-word;max-height:280px;overflow:auto;line-height:1.55}
:root[data-theme="light"] .code{background:#0F1115;color:#D7DCE6}

/* charts */
.chart{position:relative}
.chart svg{display:block;width:100%;overflow:visible}
.axis{font-family:var(--mono);font-size:9px;fill:var(--muted2);font-variant-numeric:tabular-nums}
.gridline{stroke:var(--hair);stroke-width:1}
path.draw,circle.draw{transition:stroke-dashoffset 1.1s cubic-bezier(.3,.8,.3,1)}
.chart .endpt{filter:drop-shadow(0 0 4px currentColor)}
.chart .clabel{display:flex;gap:14px;margin-top:10px;font-size:11px;color:var(--muted)}
.chart .clabel span{display:inline-flex;align-items:center;gap:6px}
.chart .clabel i{width:12px;height:2px;border-radius:2px}

/* bento analytics */
.bento{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-top:14px}
.bento>*{grid-column:span 3}
.bento .b-wide{grid-column:span 4}.bento .b-narrow{grid-column:span 2}.bento .b-full{grid-column:span 6}
@media(max-width:1320px){.bento{grid-template-columns:repeat(2,1fr)}.bento>*,.bento .b-wide,.bento .b-narrow{grid-column:span 1}.bento .b-full{grid-column:span 2}}
@media(max-width:640px){.bento{grid-template-columns:1fr}.bento>*,.bento .b-wide,.bento .b-narrow,.bento .b-full{grid-column:span 1}}
.donut-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.legend2{display:flex;flex-direction:column;gap:6px;font-size:12px;min-width:130px}
.legend2 span{display:flex;align-items:center;gap:8px;color:var(--muted)}
.legend2 i{width:8px;height:8px;border-radius:2px}
.legend2 b{margin-left:auto;font-family:var(--mono);color:var(--text);font-weight:500;font-variant-numeric:tabular-nums}
.perf{display:flex;flex-direction:column;gap:10px}
.perf .row{display:grid;grid-template-columns:130px 1fr auto;gap:10px;align-items:center;font-size:12px;font-variant-numeric:tabular-nums}
.perf .ct{display:inline-flex;align-items:center;gap:7px;text-transform:capitalize;font-weight:500}
.bar2{height:5px;border-radius:3px;background:var(--panel2);overflow:hidden}
.bar2 i{display:block;height:100%;border-radius:3px;background:var(--text);
  transition:width 1s cubic-bezier(.3,.8,.3,1)}

/* stats bar */
.statsbar{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:14px;align-items:stretch;margin-top:14px;
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;box-shadow:var(--shadow-sm)}
@media(max-width:900px){.statsbar{grid-template-columns:repeat(2,1fr)}}
.stat{display:flex;gap:12px;align-items:flex-start;padding:8px 10px;border-radius:10px;position:relative;transition:background .15s}
.stat:not(:last-child):not(:nth-last-child(2))::after{content:"";position:absolute;right:-7px;top:14%;bottom:14%;width:1px;background:var(--hair)}
.stat .ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--panel2);border:1px solid var(--border);color:var(--muted);flex:0 0 auto}
.stat .ico svg{width:16px;height:16px}
.stat.acc .ico{color:var(--green);background:color-mix(in srgb,var(--green) 8%,var(--panel2));border-color:color-mix(in srgb,var(--green) 20%,var(--border))}
.stat.conf .ico{color:var(--accent2);background:color-mix(in srgb,var(--accent) 8%,var(--panel2));border-color:color-mix(in srgb,var(--accent) 20%,var(--border))}
.stat.time .ico{color:var(--c-tool_execution);background:color-mix(in srgb,var(--c-tool_execution) 8%,var(--panel2));border-color:color-mix(in srgb,var(--c-tool_execution) 20%,var(--border))}
.stat.target .ico{color:var(--amber);background:color-mix(in srgb,var(--amber) 8%,var(--panel2));border-color:color-mix(in srgb,var(--amber) 20%,var(--border))}
.stat .body{display:flex;flex-direction:column;min-width:0;flex:1}
.stat .k{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.stat .v{font-size:22px;font-weight:600;font-family:var(--mono);margin-top:3px;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1.1}
.stat .delta{margin-top:3px;font-size:10.5px;font-family:var(--mono);color:var(--muted2);font-variant-numeric:tabular-nums}

/* meta view */
.viewpad{padding:18px 22px 30px;max-width:1200px;margin:0 auto}
.bigstats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
@media(max-width:780px){.bigstats{grid-template-columns:1fr}}
.bigstat{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:border-color .15s}
.bigstat:hover{border-color:color-mix(in srgb,var(--text) 10%,var(--border))}
.bigstat .ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--panel2);border:1px solid var(--border);color:var(--green);margin-bottom:18px}
.bigstat .ico svg{width:18px;height:18px}
.bigstat.localiz .ico{color:var(--accent2);background:color-mix(in srgb,var(--accent) 8%,var(--panel2));border-color:color-mix(in srgb,var(--accent) 20%,var(--border))}
.bigstat.cf .ico{color:var(--c-tool_execution);background:color-mix(in srgb,var(--c-tool_execution) 8%,var(--panel2));border-color:color-mix(in srgb,var(--c-tool_execution) 22%,var(--border))}
.bigstat.attr .ico{color:var(--green);background:color-mix(in srgb,var(--green) 8%,var(--panel2));border-color:color-mix(in srgb,var(--green) 22%,var(--border))}
.bigstat .n{font-size:36px;font-weight:600;font-family:var(--mono);line-height:1;letter-spacing:-0.03em;color:var(--text);font-variant-numeric:tabular-nums}
.bigstat .l{margin-top:12px;font-weight:500;letter-spacing:-0.005em}
.bigstat .s{margin-top:3px;font-size:11.5px;color:var(--muted2)}
.bigstat .ring{position:absolute;right:-40px;top:-40px;width:120px;height:120px;border-radius:50%;border:10px solid color-mix(in srgb,var(--text) 4%,transparent);opacity:.8}
.bigstat svg.spark{position:absolute;right:16px;bottom:14px;opacity:.7}

/* hero performance card (Runs view) — featured chart like the balance hero in reference */
.hero-perf{display:grid;grid-template-columns:minmax(260px,1fr) minmax(0,1.4fr);gap:18px;
  background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
@media(max-width:1320px){.hero-perf{grid-template-columns:1fr}}
.hero-perf::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(420px 220px at 95% 0%,color-mix(in srgb,var(--c-tool_execution) 14%,transparent),transparent 65%);
  border-radius:var(--r)}
.hero-meta{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}
.hero-meta .lbl{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:11.5px;font-weight:500;letter-spacing:-0.005em}
.hero-meta .lbl .ico{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:var(--panel2);border:1px solid var(--border);color:var(--c-tool_execution)}
.hero-meta .lbl .ico svg{width:14px;height:14px}
.hero-num{font-size:36px;font-weight:600;letter-spacing:-0.025em;font-family:var(--mono);line-height:1;font-variant-numeric:tabular-nums}
.hero-num small{font-size:13px;color:var(--muted2);margin-left:6px;font-weight:400}
.hero-sub{display:flex;gap:18px;color:var(--muted);font-size:11.5px;font-family:var(--mono);font-variant-numeric:tabular-nums;flex-wrap:wrap}
.hero-sub b{color:var(--text);font-weight:500;margin-left:5px}
.hero-tag{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;
  background:color-mix(in srgb,var(--c-tool_execution) 12%,transparent);color:#7eedda;border:1px solid color-mix(in srgb,var(--c-tool_execution) 20%,transparent);width:fit-content;letter-spacing:.04em}
.hero-chart{position:relative;z-index:1}
.hero-chart svg{height:170px;width:100%;display:block;overflow:visible}
table.pc{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums}
table.pc th{text-align:left;color:var(--muted2);font-weight:500;padding:10px 12px;border-bottom:1px solid var(--border);text-transform:uppercase;font-size:10px;letter-spacing:.06em}
table.pc td{padding:11px 12px;border-bottom:1px solid var(--hair)}
table.pc tbody tr:hover td{background:var(--panel2)}
table.pc tbody tr:last-child td{border-bottom:0}
.note{color:var(--muted2);font-size:11.5px;font-family:var(--mono);line-height:1.65;margin-top:14px;font-variant-numeric:tabular-nums}
.empty{padding:50px;text-align:center;color:var(--muted)}
.drift-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.drift-row{grid-template-columns:1fr}}

@media(prefers-reduced-motion:reduce){
  #view.anim,#view.anim *{animation:none!important}
  path.draw,circle.draw{transition:none!important}
}

/* --- ported designs: featured widget grid --- */
.featured{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-top:14px}
.featured>*{grid-column:span 3}
.featured .f-full{grid-column:span 6}
.featured .f-third{grid-column:span 2}
.featured .f-two-third{grid-column:span 4}
@media(max-width:1320px){.featured{grid-template-columns:repeat(2,1fr)}.featured>*,.featured .f-third,.featured .f-two-third{grid-column:span 1}.featured .f-full{grid-column:span 2}}
@media(max-width:640px){.featured{grid-template-columns:1fr}.featured>*,.featured .f-third,.featured .f-two-third,.featured .f-full{grid-column:span 1}}

/* funnel (stacked-area + stage cards, from area-charts-2) */
.funnel-card{position:relative;overflow:hidden}
.funnel-stages{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:4px 4px 14px}
@media(max-width:900px){.funnel-stages{grid-template-columns:repeat(2,1fr)}}
.funnel-stage{display:flex;gap:11px;align-items:flex-start}
.funnel-stage .rail{width:2px;align-self:stretch;border-radius:2px;background:var(--border);min-height:42px}
.funnel-stage .fbody{display:flex;flex-direction:column;gap:7px;min-width:0;flex:1}
.funnel-stage .k{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:-0.005em}
.funnel-stage .vrow{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.funnel-stage .v{font-size:22px;font-weight:600;font-family:var(--mono);letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1}
.funnel-stage .fdelta{display:inline-flex;align-items:center;gap:3px;font-family:var(--mono);font-size:10.5px;font-weight:500;font-variant-numeric:tabular-nums}
.funnel-stage .fdelta.up{color:#86efac}.funnel-stage .fdelta.down{color:#ff9aa3}.funnel-stage .fdelta.flat{color:var(--muted2)}
.funnel-chart{position:relative}
.funnel-chart svg{height:230px;width:100%;display:block;overflow:visible}

/* HUD-framed pulse (from hud-area-chart-1) */
.hud-wrap{position:relative;width:100%;aspect-ratio:1.02/1;max-height:260px}
.hud-frame{position:absolute;inset:0;pointer-events:none}
.hud-frame svg{width:100%;height:100%;display:block}
.hud-chart-inner{position:absolute;inset:14px 22px 18px 14px}
.hud-chart-inner svg{width:100%;height:100%;display:block;overflow:visible}
.hud-readout{position:absolute;left:18px;bottom:10px;font-family:var(--mono);font-size:11px;color:var(--text);letter-spacing:.04em;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:6px}
.hud-readout .hudot{width:6px;height:6px;border-radius:50%;background:var(--c-tool_execution);box-shadow:0 0 8px var(--c-tool_execution)}
.hud-readout .lbl{color:var(--muted2)}

/* glowing radar (from radar-chart) */
.radar-wrap{display:flex;align-items:center;justify-content:center;padding:6px 0 6px}
.radar-wrap svg{width:min(280px,100%);height:auto;overflow:visible}
.radar-axis{stroke:var(--hair);stroke-width:1;fill:none}
.radar-axis.dash{stroke-dasharray:3 3}
.radar-axis-label{font-family:var(--sans);font-size:10.5px;fill:var(--muted);font-weight:500;text-transform:capitalize}
.radar-legend{display:flex;justify-content:center;gap:14px;color:var(--muted);font-size:11px;padding:6px 0 4px}
.radar-legend span{display:inline-flex;align-items:center;gap:6px}
.radar-legend i{width:8px;height:8px;border-radius:2px}

/* animated stat card (from card-4) */
.statcard{position:relative;display:flex;flex-direction:column;gap:8px;padding:20px;border-radius:var(--r);overflow:hidden;
  background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 96%,#000),color-mix(in srgb,var(--accent2) 90%,#000) 70%,color-mix(in srgb,var(--accent) 85%,#000));
  color:#fff;border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);
  box-shadow:0 18px 40px -22px color-mix(in srgb,var(--accent) 85%,transparent),0 1px 0 rgba(255,255,255,.06) inset;
  min-height:200px}
.statcard::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.10) 1.5px,transparent 1.7px);
  background-size:18px 18px;mask-image:linear-gradient(140deg,#000 30%,transparent 110%);
  -webkit-mask-image:linear-gradient(140deg,#000 30%,transparent 110%)}
.statcard .sc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1}
.statcard .sc-head h3{margin:0;font-size:13px;font-weight:500;color:rgba(255,255,255,.92);letter-spacing:-0.005em}
.statcard .sc-ico{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.14);display:grid;place-items:center;border:1px solid rgba(255,255,255,.18);color:#fff;flex:0 0 auto}
.statcard .sc-ico svg{width:15px;height:15px}
.statcard .sc-body{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:14px;position:relative;z-index:1;flex:1}
.statcard .sc-primary{font-size:54px;font-weight:700;letter-spacing:-0.04em;font-family:var(--mono);line-height:.95;font-variant-numeric:tabular-nums;display:inline-flex;align-items:baseline}
.statcard .sc-primary small{font-size:18px;font-weight:600;opacity:.82;margin-left:3px}
.statcard .sc-divider{height:2px;flex:1;align-self:center;border-radius:2px;background:rgba(255,255,255,.22);min-width:18px;margin:0 4px 16px}
.statcard .sc-secondary{display:flex;flex-direction:column;align-items:flex-end;gap:2px;min-width:0;text-align:right}
.statcard .sc-secondary .num{font-size:28px;font-weight:600;font-family:var(--mono);letter-spacing:-0.02em;line-height:1;font-variant-numeric:tabular-nums}
.statcard .sc-secondary .lbl{font-size:11px;color:rgba(255,255,255,.7);font-weight:400}
.statcard .sc-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;z-index:1;margin-top:auto;padding-top:8px;font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.78);font-variant-numeric:tabular-nums}
.statcard .sc-foot .scp{padding:3px 7px;border-radius:5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);letter-spacing:.04em;font-weight:500}

/* glowing bar chart (from incident-chart) */
.barglow-card{background:linear-gradient(135deg,rgba(124,92,255,.10),rgba(64,158,255,.05) 60%),rgba(18,20,26,.52);
  backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
  border:1px solid color-mix(in srgb,var(--accent) 14%,var(--border));border-radius:var(--r);
  box-shadow:0 18px 28px -22px rgba(0,0,0,.55),0 32px 64px -32px rgba(0,0,0,.5),0 1px 0 rgba(255,255,255,.05) inset;position:relative;overflow:hidden}
:root[data-theme="light"] .barglow-card{box-shadow:0 12px 24px -18px rgba(15,23,42,.18),0 24px 56px -28px rgba(15,23,42,.14),0 1px 0 rgba(255,255,255,.6) inset}
.barglow-card .hd h3{font-size:14px;color:var(--text);font-weight:600;letter-spacing:-0.005em}
.barglow-card .bd{padding:0 14px 16px}
.barglow-wrap svg{width:100%;height:230px;display:block;overflow:visible}
.barglow-wrap .bg-axlbl{font-family:var(--sans);font-size:10px;fill:var(--muted2)}
.barglow-wrap .bg-val{font-family:var(--mono);font-size:11px;fill:var(--text);font-weight:600;font-variant-numeric:tabular-nums}

/* --- glass surfaces: tinted, blurred panels instead of flat gray --- */
:root[data-theme="dark"]{
  --panel-bg:rgba(18,20,26,.42);
  --panel-tint:linear-gradient(135deg,rgba(124,92,255,.10),rgba(64,158,255,.05) 55%,rgba(159,122,234,.08));
  --raised-bg:rgba(27,30,38,.55);
  --raised-tint:linear-gradient(135deg,rgba(124,92,255,.12),rgba(64,158,255,.06) 60%,rgba(159,122,234,.08));
  --panel-edge:rgba(255,255,255,.09);
  --panel-glow:inset 0 1px 0 rgba(255,255,255,.06),0 12px 32px -22px rgba(0,0,0,.55);
}
:root[data-theme="light"]{
  --panel-bg:rgba(255,255,255,.45);
  --panel-tint:linear-gradient(135deg,rgba(124,92,255,.07),rgba(64,158,255,.05) 55%,rgba(159,122,234,.06));
  --raised-bg:rgba(255,255,255,.62);
  --raised-tint:linear-gradient(135deg,rgba(124,92,255,.08),rgba(64,158,255,.05) 60%,rgba(159,122,234,.07));
  --panel-edge:rgba(15,23,42,.10);
  --panel-glow:inset 0 1px 0 rgba(255,255,255,.6),0 12px 32px -22px rgba(15,23,42,.18);
}
.card,.run-head,.statsbar,.bigstat,.hero-perf{
  background:var(--panel-tint),var(--panel-bg);
  backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
  border-color:var(--panel-edge);
  box-shadow:var(--panel-glow);
}
.card:hover,.bigstat:hover{
  border-color:color-mix(in srgb,var(--accent) 30%,var(--panel-edge));
}
/* DAG nodes — clean, refined surface (no frosted glass): subtle top sheen + whisper of violet */
.dnode{
  background:
    linear-gradient(180deg,color-mix(in srgb,var(--text) 5%,transparent),transparent 42%),
    color-mix(in srgb,var(--raised) 92%,var(--accent) 4%);
  backdrop-filter:none;-webkit-backdrop-filter:none;
  border-color:var(--border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 10px 22px -20px rgba(0,0,0,.7);
}
.dnode:hover{
  background:
    linear-gradient(180deg,color-mix(in srgb,var(--text) 7%,transparent),transparent 45%),
    color-mix(in srgb,var(--raised) 88%,var(--accent) 8%);
  border-color:color-mix(in srgb,var(--accent) 30%,var(--border));
}
.dnode.sel{
  background:
    linear-gradient(180deg,color-mix(in srgb,var(--accent) 12%,transparent),transparent 50%),
    color-mix(in srgb,var(--raised) 82%,var(--accent) 12%);
  border-color:color-mix(in srgb,var(--accent) 55%,var(--border));
}
/* stat row & search field — give them a soft tint too */
.statsbar .stat .ico{background:color-mix(in srgb,var(--panel-bg) 75%,var(--accent) 6%)}
.search{background:color-mix(in srgb,var(--panel-bg) 60%,transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.reco{background:color-mix(in srgb,var(--panel-bg) 80%,transparent);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.snippet-q{background:color-mix(in srgb,var(--panel-bg) 80%,transparent);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
/* keep glassy look but block backdrop on the runlist (sidebar) so the long scroller stays readable */
.runlist{background:color-mix(in srgb,var(--panel-bg) 90%,transparent)}

/* --- editorial serif display typography (Instrument Serif) — big text only; numbers stay mono --- */
.brand h1{font-family:var(--serif);font-size:21px;font-weight:400;letter-spacing:-0.01em;line-height:1;margin-top:-1px}
.run-head .title{font-family:var(--serif);font-size:23px;font-weight:400;letter-spacing:0}
.rc-comp{font-family:var(--serif);font-weight:400;font-size:26px;letter-spacing:0}
.card .hd h3{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--text);letter-spacing:0}
.barglow-card .hd h3,.statcard .sc-head h3,.funnel-stage .k{font-family:var(--serif)}
.barglow-card .hd h3,.statcard .sc-head h3{font-size:16px;font-weight:400;color:var(--text)}
.funnel-stage .k{font-size:14px;color:var(--text)}
.bigstat .l{font-family:var(--serif);font-size:17px;font-weight:400}
.rc-comp .where{font-family:var(--mono)}
.empty{font-family:var(--serif);font-size:16px}
/* a touch more line-height so the serif breathes inside tight card headers */
.card .hd{min-height:auto;padding-top:13px}
</style>
</head>
<body>
<div class="bg" aria-hidden="true"><div class="grain"></div></div>
<div class="topbar">
  <div class="brand">
    <div class="logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="position:relative;z-index:1"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
    <div class="brand-text">
      <h1>Culprit</h1>
      <svg class="brand-underline" id="brandUnderline" viewBox="0 0 60 6" aria-hidden="true">
        <path id="brandPath" d="M 1,3 Q 15,1 30,3 Q 45,5 59,3"/>
      </svg>
      <div class="sub">Component-Level Failure Attribution</div>
    </div>
  </div>
  <nav class="nav" id="nav">
    <button data-v="runs" class="active" onclick="setView('runs')">Runs</button>
    <button data-v="meta" onclick="setView('meta')">Meta-Evaluation</button>
    <button data-v="drift" onclick="setView('drift')">Drift</button>
    <button data-v="analytics" onclick="setView('analytics')">Analytics</button>
  </nav>
  <div class="tools">
    <button class="icon-btn" title="Toggle theme" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle light/dark theme">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="btn primary" onclick="exportReport()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export Report
    </button>
  </div>
</div>

<div id="view"></div>

<script src="vendor/motion.min.js"></script>
<script>
let DATA = {runs:[],meta_eval:null};
fetch('dashboard_data.json').then(r=>r.ok?r.json():Promise.reject()).then(d=>{DATA=d;mount(true);}).catch(()=>{
  console.warn('dashboard_data.json not found, trying legacy .js fallback');
  const s=document.createElement('script');s.src='dashboard_data.js';
  s.onload=()=>{DATA=window.CULPRIT_DATA||DATA;mount(true);};
  document.body.appendChild(s);
});
</script>
<script>
const _DATA = DATA;
const RUNS = DATA.runs||[];
const TYPEC = {retrieval:'#4C9AFF',planning:'#9F7AEA',tool_execution:'#2DD4BF',synthesis:'#F59E0B',unknown:'#94A3B8'};
const NICE = {retrieval:'Retrieval',planning:'Planning',tool_execution:'Tool Execution',synthesis:'Synthesis'};
const prefersReduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
let S = {view:'runs', runId:(RUNS.find(r=>r.attribution.end_to_end_verdict==='fail')||RUNS[0]||{}).run_id, stepId:null, snip:'evidence', q:'', page:0, pageSize:30};

const esc=s=>String(s==null?'':s).replace(/[&<>"'\/`']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#x27;','/':'&#x2F;','`':'&#x60;'}[c]));
const fv=v=>v===null||v===undefined?'null':(typeof v==='object'?JSON.stringify(v):String(v));
const isFail=r=>r.attribution.end_to_end_verdict==='fail';
const runById=id=>RUNS.find(r=>r.run_id===id);
const fmtMs=ms=>ms==null?'—':(ms<1000?`${Math.round(ms)} ms`:`${(ms/1000).toFixed(2)} s`);
const pct=x=>(x*100).toFixed(1)+'%';

/* smooth Catmull-Rom -> cubic bezier path through points [[x,y],...] */
function smoothPath(pts,tension){
  const t=tension==null?0.2:tension;
  if(pts.length<2)return pts.length?`M${pts[0][0]},${pts[0][1]}`:'';
  const d=[`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`];
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])*t,c1y=p1[1]+(p2[1]-p0[1])*t;
    const c2x=p2[0]-(p3[0]-p1[0])*t,c2y=p2[1]-(p3[1]-p1[1])*t;
    d.push(`C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`);
  }
  return d.join(' ');
}

/* ---------- aggregates (all from real runs) ---------- */
function agg(){
  const n=RUNS.length, fails=RUNS.filter(isFail);
  const dist={}; fails.forEach(r=>{const k=r.attribution.decisive_step_type;dist[k]=(dist[k]||0)+1;});
  const conf=RUNS.map(r=>r.attribution.confidence||0);
  const meanConf=conf.reduce((a,b)=>a+b,0)/(n||1);
  const meanTime=RUNS.reduce((a,r)=>a+(r.total_ms||0),0)/(n||1);
  const hist=[0,0,0,0,0]; conf.forEach(c=>{let i=Math.min(4,Math.floor(c*5));hist[i]++;});
  return {n, nFail:fails.length, successRate:(n-fails.length)/(n||1), dist, meanConf, meanTime, hist};
}

/* ---------- run list ---------- */
function runList(){
  const q=S.q.toLowerCase();
  const items=RUNS.filter(r=>!q||r.run_id.toLowerCase().includes(q)||(r.ticket&&(r.ticket.id+r.ticket.title).toLowerCase().includes(q)));
  const totalPages=Math.max(1,Math.ceil(items.length/S.pageSize));
  S.page=Math.min(S.page,totalPages-1);
  const page=items.slice(S.page*S.pageSize,(S.page+1)*S.pageSize);
  const card=r=>{const a=r.attribution,f=isFail(r);
    const rid=esc(r.run_id);
    return `<div class="run-card ${r.run_id===S.runId?'active':''}" data-runid="${rid}" onclick="pickRun(this.dataset.runid)">
      <div class="run-row"><span class="run-id">${esc(r.ticket?r.ticket.id:r.run_id)}</span>
        <span class="badge ${f?'fail':'pass'}">${f?'FAILED':'SUCCESS'}</span></div>
      <div class="run-sub">
        <span class="dot" style="background:${f?'var(--red)':'var(--green)'}"></span>

    </div>`;};
  const pagerBtn=(label,pageFn,disabled)=>`<button class="btn" style="padding:4px 10px;font-size:11px" ${disabled?'disabled':'onclick="'+pageFn+';document.getElementById(\'runlistMount\').innerHTML=runList();bindSearch();"'} style="${disabled?'opacity:.35;cursor:default':''}">${label}</button>`;
  const pp=pagerBtn('◀','S.page--',S.page<=0);
  const np=pagerBtn('▶','S.page++',S.page>=totalPages-1);
  return `<div class="card runlist">
    <div class="hd"><h3>Runs</h3><span class="mono" style="font-size:11px;color:var(--muted2)">${items.length}</span></div>
    <div class="search"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Search runs…" value="${esc(S.q)}" oninput="S.q=this.value;S.page=0;document.getElementById('runlistMount').innerHTML=runList();bindSearch();" data-safe="1"></div>
    <div class="runscroll">${page.map(card).join('')||'<div class="empty">No matches</div>'}</div>
    <div class="pager">${pp} <span>${S.page*S.pageSize+1}–${Math.min((S.page+1)*S.pageSize,items.length)} of ${items.length}</span> ${np} ${RUNS.filter(isFail).length} fail · ${RUNS.length-RUNS.filter(isFail).length} pass</div>
  </div>`;
}
function bindSearch(){const i=document.querySelector('.search input');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}}

/* ---------- DAG ---------- */
function stepStateClass(s,dec){if(s.step_id===dec)return'decisive';const st=(s.status||'').toLowerCase();if(st==='error')return'err';if(st==='ok')return'ok';if(st==='skipped')return'skip';return'warn';}
function dag(run){
  const steps=[...run.trajectory.steps].sort((a,b)=>a.step_index-b.step_index);
  const dec=run.attribution.decisive_step_id;
  const startNode=`<div class="dnode ok"><div class="accentbar"></div><div class="nmain"><div class="ntitle">Ticket Intake</div><div class="nsub">${esc(run.ticket?run.ticket.id+' · '+run.ticket.title:'input')}</div></div><div class="statedot ok">▸</div></div>`;
  const endOk=run.trajectory.final_status==='task_succeeded';
  const endNode=`<div class="dnode ${endOk?'ok':'err'}"><div class="accentbar"></div><div class="nmain"><div class="ntitle">${endOk?'Routed':'Run Halted'}</div><div class="nsub">final_status: ${esc(run.trajectory.final_status)}</div></div><div class="statedot ${endOk?'ok':'err'}">${endOk?'✓':'✕'}</div></div>`;
  const conn=`<div class="connector"></div>`;
  const node=s=>{const cls=stepStateClass(s,dec);const isDec=s.step_id===dec;
    const sd=cls==='decisive'?'err':cls;const icon={ok:'✓',err:'✕',warn:'!',skip:'–'}[sd]||'•';
    const tool=s.action?s.action.tool_name:'';
    const sid=esc(s.step_id);
    return `<div class="dnode ${cls} ${s.step_id===S.stepId?'sel':''}" data-stepid="${sid}" onclick="pickStep(this.dataset.stepid)">
      ${isDec?'<span class="dec-tag">DECISIVE</span>':''}
      <div class="accentbar"></div>
      <div class="nmain"><div class="ntitle">${esc(NICE[s.step_type]||s.step_type)}</div>
        <div class="nsub">${esc(tool||s.step_id)}</div></div>
      <div class="nright"><span>${s.latency_ms!=null?Math.round(s.latency_ms)+'ms':''}</span>
        <span class="statedot ${sd}">${icon}</span></div></div>`;};
  const body=[startNode, ...steps.map(node), endNode].join(conn);
  const legend=`<span><i style="background:var(--green)"></i>Success</span><span><i style="background:var(--red)"></i>Failed</span><span><i style="background:var(--amber)"></i>Warning</span><span><i style="background:var(--slate)"></i>Skipped</span>`;
  return `<div class="card"><div class="hd"><h3>Trajectory DAG</h3><div class="legend">${legend}</div></div>
    <div class="bd"><div class="dag">${body}</div>${healthCurve(run)}${stepDetail(run)}</div></div>`;
}
/* per-step health curve: dips at the decisive / failing step (qualitative signal, not a measured metric) */
function healthCurve(run){
  const steps=[...run.trajectory.steps].sort((a,b)=>a.step_index-b.step_index);
  if(steps.length<2)return'';
  const dec=run.attribution.decisive_step_id;
  const val=s=>{const c=stepStateClass(s,dec);return c==='decisive'?0.12:c==='err'?0.18:c==='warn'?0.55:c==='skip'?0.5:0.95;};
  const w=320,h=70,padT=8,padB=8,padX=8,n=steps.length;
  const xs=i=>padX+(n<=1?0:i/(n-1)*(w-2*padX));
  const ys=v=>padT+(1-v)*(h-padT-padB);
  const pts=steps.map((s,i)=>[xs(i),ys(val(s))]);
  const line=smoothPath(pts);
  const area=`${line} L${xs(n-1).toFixed(1)},${h-padB} L${xs(0).toFixed(1)},${h-padB} Z`;
  const dots=steps.map((s,i)=>{const c=stepStateClass(s,dec);const col=c==='decisive'||c==='err'?'var(--red)':c==='warn'?'var(--amber)':'var(--green)';
    return `<circle cx="${xs(i).toFixed(1)}" cy="${ys(val(s)).toFixed(1)}" r="${s.step_id===dec?4:2.6}" fill="${col}" ${s.step_id===dec?'class="endpt" style="color:var(--red)"':''}/>`;}).join('');
  return `<div class="chart" style="margin-top:12px"><div class="bl" style="margin:0 0 6px">Step health signal</div>
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:70px">
      <defs><linearGradient id="hc" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--green)" stop-opacity=".28"/><stop offset="1" stop-color="var(--green)" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#hc)"/>
      <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"
        pathLength="100" stroke-dasharray="100" data-len="100" data-off="0" class="draw"/>
      ${dots}
    </svg></div>`;
}
function stepDetail(run){
  if(!S.stepId)return'';
  const s=run.trajectory.steps.find(x=>x.step_id===S.stepId);if(!s)return'';
  const args=s.action?JSON.stringify(s.action.arguments,null,2):'—';
  const res=typeof s.result==='object'?JSON.stringify(s.result,null,2):String(s.result==null?'—':s.result);
  return `<div style="margin-top:14px">
    <div class="bl">${esc(s.step_id)} · ${esc(s.step_type)} · status ${esc(s.status)}</div>
    <div class="code"><b style="color:#64748b">arguments</b>\n${esc(args)}\n\n<b style="color:#64748b">result</b>\n${esc(res)}</div></div>`;
}

/* ---------- radial gauge (animated sweep) ---------- */
function gauge(v){
  const val=v==null?0:v, r=34;
  const col=val>=0.8?'var(--red)':val>=0.5?'var(--amber)':'var(--green)';
  const off=(100*(1-val)).toFixed(1);
  return `<svg width="92" height="92" viewBox="0 0 92 92"><circle cx="46" cy="46" r="${r}" fill="none" stroke="var(--panel2)" stroke-width="9"/>
    <circle cx="46" cy="46" r="${r}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"
      pathLength="100" stroke-dasharray="100" data-len="100" data-off="${off}" class="draw"
      transform="rotate(-90 46 46)"/>
    <text x="46" y="50" text-anchor="middle" font-family="Fira Code" font-size="19" font-weight="800" fill="var(--text)">${v==null?'—':Math.round(val*100)+'%'}</text></svg>`;
}

/* ---------- verdict / root cause ---------- */
function verdict(run){
  const a=run.attribution;
  if(!isFail(run)){
    return `<div class="card"><div class="hd"><h3>Verdict</h3></div><div class="bd">
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 8px">
        <div style="width:54px;height:54px;border-radius:15px;background:var(--green-d);display:grid;place-items:center;margin-bottom:12px">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <div style="font-size:18px;font-weight:800">No failure to attribute</div>
        <p style="color:var(--muted);max-width:340px">${esc(a.why)}</p>
        <span class="tag low">confidence ${(a.confidence||1).toFixed(2)}</span></div></div></div>`;
  }
  const cf=a.counterfactual||{};
  const sev=a.crs==null?0:a.crs;
  const sevLabel=sev>=0.8?'High':sev>=0.5?'Medium':'Low', sevCls=sev>=0.8?'high':sev>=0.5?'mid':'low';
  const confLabel=a.confidence>=0.8?'High':a.confidence>=0.5?'Medium':'Low', confCls=a.confidence>=0.8?'high':a.confidence>=0.5?'mid':'low';
  const ev=(a.evidence||[]).map(e=>`<li><span class="mono">${esc(e.field)}</span> — expected <span style="color:#86efac">${esc(fv(e.expected))}</span>, got <span style="color:#ffb3b8">${esc(fv(e.actual))}</span></li>`).join('')
    ||`<li>${esc(a.why)}</li>`;
  const edits=(cf.repair&&cf.repair.edits||[]).map(e=>`<div class="edit"><span class="mono" style="color:var(--muted)">${esc(e.field)}</span> <span class="from">${esc(fv(e.from_value))}</span> <span class="ar">→</span> <span class="to">${esc(fv(e.to_value))}</span></div>`).join('');
  return `<div class="card rootcause"><div class="hd"><h3>Verdict</h3>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></svg></div>
    <div class="bd">
      <div class="topline"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg> Root Cause</div>
      <div class="rc-comp">${esc(NICE[a.decisive_step_type]||a.decisive_step_type)} <span class="where">@ ${esc(a.decisive_step_id)}</span></div>
      <div class="rc-metrics">
        <div class="m"><div class="k">Confidence</div><div class="v">${a.confidence.toFixed(2)}</div><span class="tag ${confCls}">${confLabel}</span></div>
        <div class="m"><div class="k">Severity (CRS)</div><div class="v" style="font-size:18px">${sevLabel}</div><span class="tag ${sevCls}">${cf.confirms_attribution?'replay-confirmed':'unconfirmed'}</span></div>
        <div>${gauge(a.crs)}</div>
      </div>
      <span class="tag high mono">${esc(a.failure_category)}</span>
      <div class="bl">Evidence</div><ul class="ev-list">${ev}</ul>
      <div class="bl">Root Cause Explanation</div><div class="why">${esc(a.why)}</div>
      <div class="reco"><div class="rl"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#86efac" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2Z"/></svg> Recommendation</div>
        <ul><li>${esc(a.recommended_fix||'—')}</li></ul>
        ${edits?`<div class="bl" style="margin:12px 0 4px">Counterfactual proof (minimal repair)</div>${edits}<div class="outcome">▶ replay outcome: ${esc(cf.result)}</div>`:''}
      </div>
    </div></div>`;
}

/* ---------- overview ---------- */
function overview(run){
  const a=run.attribution,t=run.trajectory,f=isFail(run);
  const rows=[['Status',f?'FAILED':'SUCCESS'],['Total time',fmtMs(run.total_ms)],['Steps',t.steps.length],
    ['Final status',t.final_status],['Decisive',f?(NICE[a.decisive_step_type]||a.decisive_step_type):'—'],
    ['Confidence',a.confidence.toFixed(2)],['CRS',a.crs==null?'—':a.crs.toFixed(2)],
    ['Ticket',run.ticket?run.ticket.id:'—'],['Reporter',run.ticket?run.ticket.reporter:'—'],
    ['Product area',run.ticket?(run.ticket.product_area||'—'):'—'],['Run id',run.run_id]];
  const dots=[...Array(40)].map((_,i)=>`<circle cx="${10+(i%8)*9}" cy="${10+Math.floor(i/8)*9}" r="1.6" fill="var(--accent)"/>`).join('');
  return `<div class="card"><div class="hd"><h3>Run Overview</h3>
    <svg class="sphere" width="46" height="46" viewBox="0 0 80 50">${dots}</svg></div>
    <div class="bd"><dl class="kv">${rows.map(([k,v])=>`<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join('')}</dl></div></div>`;
}

/* ---------- evidence snippets ---------- */
function snippets(run){
  const t=run.trajectory;
  const ret=t.steps.find(s=>s.step_type==='retrieval');
  const tools=t.steps.filter(s=>s.step_type==='tool_execution');
  const tabBtn=(id,l)=>`<button class="${S.snip===id?'active':''}" onclick="S.snip='${id}';mount();">${l}</button>`;
  let body='';
  if(S.snip==='evidence'){
    const res=(ret&&ret.result&&ret.result.results)||[];
    const q=ret&&ret.action?ret.action.arguments.query:'';
    const filt=ret&&ret.result?ret.result.filtered:null;
    body=`<div class="bl" style="margin-top:0">Retrieval query</div><div class="snippet-q">${esc(q||'—')}${filt===false?'  <span style="color:#ffb3b8">[unfiltered]</span>':''}</div>
      <div class="bl">Retrieved tickets (score)</div>
      ${res.length?res.map((r,i)=>`<div class="res"><div><span class="n">${i+1}.</span>${esc(r.title||r.id)} <span style="color:var(--muted2)">· ${esc(r.product_area||'')}</span></div><span class="sc ${(r.score||0)>=0.4?'hi':'lo'}">${(r.score!=null?r.score.toFixed(2):'—')}</span></div>`).join(''):'<div style="color:var(--muted2);font-size:12px">No retrieval results captured.</div>'}`;
  }else if(S.snip==='tools'){
    body=tools.map(s=>`<div class="bl" style="margin-top:8px">${esc(s.action?s.action.tool_name:s.step_id)} · ${esc(s.status)}</div>
      <div class="code">${esc(JSON.stringify({arguments:s.action?s.action.arguments:null,result:s.result},null,2))}</div>`).join('')||'<div style="color:var(--muted2)">No tool calls.</div>';
  }else{
    body=`<div class="code">${esc(JSON.stringify(t,null,2))}</div>`;
  }
  return `<div class="card"><div class="hd"><h3>Evidence Snippets</h3></div><div class="bd">
    <div class="tabs">${tabBtn('evidence','Retrieval')}${tabBtn('tools','Tool I/O')}${tabBtn('trace','Raw Trace')}</div>${body}</div></div>`;
}

/* ---------- analytics widgets ---------- */
function donut(dist){
  const entries=Object.entries(dist); const total=entries.reduce((a,[,v])=>a+v,0)||1;
  const r=34,C=2*Math.PI*r;let off=0;
  const segs=entries.map(([k,v])=>{const frac=v/total,len=C*frac;const s=`<circle cx="46" cy="46" r="${r}" fill="none" stroke="${TYPEC[k]||'#888'}" stroke-width="13" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 46 46)"/>`;off+=len;return s;}).join('');
  const leg=entries.map(([k,v])=>`<span><i style="background:${TYPEC[k]||'#888'}"></i>${esc(NICE[k]||k)}<b>${v}</b></span>`).join('')||'<span style="color:var(--muted2)">No failures recorded</span>';
  return `<div class="card b-narrow"><div class="hd"><h3>Failure Distribution</h3></div><div class="bd"><div class="donut-wrap">
    <svg width="92" height="92" viewBox="0 0 92 92">${segs}<text x="46" y="44" text-anchor="middle" font-family="Fira Code" font-size="17" font-weight="800" fill="var(--text)">${total}</text><text x="46" y="58" text-anchor="middle" font-size="9" fill="var(--muted2)">FAILED</text></svg>
    <div class="legend2">${leg}</div></div></div></div>`;
}
/* confidence distribution as a smooth filled curve (KDE-style over buckets) */
function histCurve(hist){
  const max=Math.max(...hist,1);const labs=['0–.2','.2–.4','.4–.6','.6–.8','.8–1'];
  const w=300,h=120,padT=12,padB=24,padX=14,n=hist.length;
  const xs=i=>padX+i/(n-1)*(w-2*padX);
  const ys=v=>padT+(1-v/max)*(h-padT-padB);
  const pts=hist.map((c,i)=>[xs(i),ys(c)]);
  const line=smoothPath(pts);
  const area=`${line} L${xs(n-1).toFixed(1)},${(h-padB).toFixed(1)} L${xs(0).toFixed(1)},${(h-padB).toFixed(1)} Z`;
  const dots=hist.map((c,i)=>`<circle cx="${xs(i).toFixed(1)}" cy="${ys(c).toFixed(1)}" r="3" fill="var(--accent2)"/>`).join('');
  const xlab=labs.map((l,i)=>`<text class="axis" x="${xs(i).toFixed(1)}" y="${h-8}" text-anchor="middle">${l}</text>`).join('');
  return `<div class="card b-narrow"><div class="hd"><h3>Confidence Distribution</h3></div><div class="bd"><div class="chart">
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="height:130px">
      <defs><linearGradient id="hd2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent2)" stop-opacity=".4"/><stop offset="1" stop-color="var(--accent2)" stop-opacity="0"/></linearGradient></defs>
      <path d="${area}" fill="url(#hd2)"/>
      <path d="${line}" fill="none" stroke="var(--accent2)" stroke-width="2.4" stroke-linecap="round" pathLength="100" stroke-dasharray="100" data-len="100" data-off="0" class="draw"/>
      ${dots}${xlab}
    </svg></div></div></div>`;
}
function perfChart(){
  const m=DATA.meta_eval;if(!m)return'';
  const rows=(m.per_category||[]).map(c=>`<div class="row"><span class="ct"><i style="width:9px;height:9px;border-radius:3px;background:${TYPEC[c.component]}"></i>${esc(NICE[c.component]||c.component)}</span><div class="bar2"><i style="width:0" data-w="${(c.f1*100).toFixed(0)}"></i></div><span class="mono">${c.f1.toFixed(2)}</span></div>`).join('');

/* Attribution funnel: stacked smooth-areas + stage stat cards (from area-charts-2) */
function funnelData(){
  const n=RUNS.length; if(!n) return null;
  const buckets=Math.min(6,Math.max(3,Math.ceil(n/4)));
  const size=Math.max(1,Math.ceil(n/buckets));
  const out=[];
  for(let i=0;i<buckets;i++){
    const slice=RUNS.slice(i*size,(i+1)*size);
    if(!slice.length) continue;
    const fails=slice.filter(isFail);
    const localized=fails.filter(r=>r.attribution.decisive_step_id);
    const confirmed=fails.filter(r=>r.attribution.counterfactual&&r.attribution.counterfactual.confirms_attribution);
    out.push({label:`B${i+1}`,runs:slice.length,failures:fails.length,localized:localized.length,confirmed:confirmed.length});
  }
  return out;
}
function funnelWidget(){
  const data=funnelData(); if(!data||data.length<2) return '';
  const stages=[
    {key:'runs',label:'Runs Observed',color:'var(--accent)'},
    {key:'failures',label:'Failures Detected',color:'var(--accent2)'},
    {key:'localized',label:'Step Localized',color:'var(--c-retrieval)'},
    {key:'confirmed',label:'Replay Confirmed',color:'var(--c-tool_execution)'},
  ];
  const last=data[data.length-1], prev=data[data.length-2]||last;
  const stageCards=stages.map(s=>{
    const v=last[s.key]||0, p=prev[s.key]||0;
    const ch=p===0?(v>0?100:0):Math.round(((v-p)/p)*100);
    const cls=ch>0?'up':ch<0?'down':'flat';
    const arr=ch>0?'▲':ch<0?'▼':'→';
    return `<div class="funnel-stage"><div class="rail" style="background:${s.color}"></div>
      <div class="fbody"><div class="k">${s.label}</div>
      <div class="vrow"><span class="v" data-count="${v}" data-dec="0">${v}</span>
        <span class="fdelta ${cls}">${arr} ${Math.abs(ch)}%</span></div></div></div>`;
  }).join('');
  const w=720,h=230,padT=14,padB=28,padL=18,padR=18,nx=data.length;
  const maxV=Math.max(...data.map(d=>d.runs),1);
  const xs=i=>padL+(nx<=1?0:i/(nx-1)*(w-padL-padR));
  const ys=v=>padT+(1-v/maxV)*(h-padT-padB);
  const keys=['runs','failures','localized','confirmed'];
  const colors={runs:'var(--accent)',failures:'var(--accent2)',localized:'var(--c-retrieval)',confirmed:'var(--c-tool_execution)'};
  const grads=keys.map(k=>`<linearGradient id="funnel-${k}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="${colors[k]}" stop-opacity=".42"/>
    <stop offset="1" stop-color="${colors[k]}" stop-opacity="0"/></linearGradient>`).join('');
  const layers=keys.map(k=>{
    const pts=data.map((d,i)=>[xs(i),ys(d[k]||0)]);
    const line=smoothPath(pts);
    const area=`${line} L${xs(nx-1).toFixed(1)},${(h-padB).toFixed(1)} L${xs(0).toFixed(1)},${(h-padB).toFixed(1)} Z`;
    return `<g><path d="${area}" fill="url(#funnel-${k})"/>
      <path d="${line}" fill="none" stroke="${colors[k]}" stroke-width="2" stroke-linecap="round"
        pathLength="100" stroke-dasharray="100" data-len="100" data-off="0" class="draw"/></g>`;
  }).join('');
  const xlab=data.map((d,i)=>`<text class="axis" x="${xs(i).toFixed(1)}" y="${h-10}" text-anchor="middle">${esc(d.label)}</text>`).join('');
  const legend=stages.map(s=>`<span><i style="background:${s.color}"></i>${s.label}</span>`).join('');
  return `<div class="card funnel-card f-full"><div class="hd"><h3>Attribution Funnel</h3>
      <div class="legend" style="gap:14px">${legend}</div></div>
    <div class="bd">
      <div class="funnel-stages">${stageCards}</div>
      <div class="funnel-chart"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <defs>${grads}</defs>${layers}${xlab}
      </svg></div>
    </div></div>`;
}

  const line=smoothPath(pts);

  return `<div class="card f-third"><div class="hd"><h3>Responsibility Pulse</h3>
      <span class="mono" style="color:var(--muted2);font-size:11px">last ${crs.length} runs</span></div>

          <rect x="1" y="1" width="${fw-2}" height="${fh-2}" fill="url(#hudDot)"/>
          <path d="${framePath}" fill="var(--text)" opacity=".55" mask="url(#hudMask)"/>
        </svg></div>
        <div class="hud-chart-inner"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="hudGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="var(--c-tool_execution)" stop-opacity=".55"/>
              <stop offset="50%" stop-color="var(--c-tool_execution)" stop-opacity=".22"/>
              <stop offset="100%" stop-color="var(--c-tool_execution)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${area}" fill="url(#hudGrad)"/>
          <path d="${line}" fill="none" stroke="var(--c-tool_execution)" stroke-width="1.6" stroke-linecap="round"
            pathLength="100" stroke-dasharray="100" data-len="100" data-off="0" class="draw"
            style="filter:drop-shadow(0 0 4px color-mix(in srgb,var(--c-tool_execution) 65%,transparent))"/>
        </svg></div>
        <div class="hud-readout"><span class="hudot"></span><span class="lbl">MEAN</span>${mean}</div>
      </div>
    </div></div>`;
}

/* Glowing component radar (from radar-chart) */
function radarWidget(){
  const m=DATA.meta_eval; if(!m||!(m.per_category||[]).length) return '';
  const cats=m.per_category;
  const size=260, cx=size/2, cy=size/2-4, radius=82;
  const n=cats.length;
  const angle=i=>(-Math.PI/2)+i*(Math.PI*2/n);
  const pt=(v,i)=>{const a=angle(i);return [cx+Math.cos(a)*radius*v,cy+Math.sin(a)*radius*v];};
  const grid=[.25,.5,.75,1].map(g=>{
    const pts=cats.map((_,i)=>pt(g,i).map(v=>v.toFixed(1)).join(',')).join(' ');
    return `<polygon class="radar-axis dash" points="${pts}"/>`;
  }).join('');
  const spokes=cats.map((_,i)=>{const [x,y]=pt(1,i);return `<line class="radar-axis" x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}"/>`;}).join('');
  const labels=cats.map((c,i)=>{
    const a=angle(i);
    const lx=cx+Math.cos(a)*(radius+22);
    const ly=cy+Math.sin(a)*(radius+22)+3;
    const anchor=Math.abs(Math.cos(a))<0.3?'middle':(Math.cos(a)>0?'start':'end');
    return `<text class="radar-axis-label" x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}">${esc(NICE[c.component]||c.component)}</text>`;
  }).join('');
  const polyFor=(key,col,fill)=>{
    const pts=cats.map((c,i)=>pt(c[key]||0,i).map(v=>v.toFixed(1)).join(',')).join(' ');
    return `<polygon points="${pts}" fill="${fill}" stroke="${col}" stroke-width="2" stroke-linejoin="round" filter="url(#radarGlow)"/>`;
  };
  return `<div class="card f-third"><div class="hd"><h3>Component Radar</h3>
      <span class="mono" style="color:var(--muted2);font-size:11px">F1 · Precision</span></div>
    <div class="bd" style="padding-bottom:10px">
      <div class="radar-wrap"><svg viewBox="0 0 ${size} ${size}">
        <defs>
          <filter id="radarGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="3.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        ${grid}${spokes}
        ${polyFor('f1','var(--accent)','color-mix(in srgb,var(--accent) 18%,transparent)')}
        ${polyFor('precision','var(--c-tool_execution)','color-mix(in srgb,var(--c-tool_execution) 14%,transparent)')}
        ${labels}
      </svg></div>
      <div class="radar-legend">
        <span><i style="background:var(--accent)"></i>F1</span>
        <span><i style="background:var(--c-tool_execution)"></i>Precision</span>
      </div>
    </div></div>`;
}

/* Attribution Quality stat card (from card-4) */
function statCardWidget(){
  const m=DATA.meta_eval; if(!m) return '';
  const acc=(m.attribution_accuracy*100).toFixed(1);
  const loc=(m.step_localization_accuracy*100).toFixed(1);
  const cf=(m.confirmation_rate*100).toFixed(0);
  return `<div class="statcard f-third">
    <div class="sc-head">
      <h3>Attribution Quality</h3>
      <div class="sc-ico">${ICONS.target}</div>
    </div>
    <div class="sc-body">
      <div class="sc-primary"><span data-count="${acc}" data-dec="1">${acc}</span><small>%</small></div>
      <div class="sc-divider"></div>
      <div class="sc-secondary">
        <span class="num" data-count="${loc}" data-dec="1">${loc}</span>
        <span class="lbl">Step Loc.</span>
      </div>
    </div>
    <div class="sc-foot">
      <span class="scp">${m.n_cases} CASES</span>
      <span>Confirmed ${cf}%</span>
    </div>
  </div>`;
}

/* Glowing bar chart — failure category counts (from incident-chart) */
function barGlowWidget(){
  const g=agg();
  const entries=Object.entries(g.dist);
  if(!entries.length) return '';
  const cats=entries.map(([k,v])=>({k,v,label:NICE[k]||k,color:TYPEC[k]||'#7C5CFF'}));
  const max=Math.max(...cats.map(c=>c.v),1);
  const w=420,h=230,padT=22,padB=52,padL=14,padR=14;
  const bw=(w-padL-padR)/cats.length;
  const bars=cats.map((c,i)=>{
    const bh=(c.v/max)*(h-padT-padB);
    const ww=Math.min(bw*0.6,52);
    const x=padL+i*bw+(bw-ww)/2;
    const y=h-padB-bh;
    const cx=(x+ww/2).toFixed(1);
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${ww.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" ry="3"
      fill="${c.color}" filter="url(#barGlow)"/>
      <text class="bg-val" x="${cx}" y="${(y-6).toFixed(1)}" text-anchor="middle">${c.v}</text>
      <text class="bg-axlbl" x="${cx}" y="${h-padB+14}" text-anchor="middle" transform="rotate(-22 ${cx} ${h-padB+14})">${esc(c.label)}</text>`;
  }).join('');
  return `<div class="barglow-card f-full">
    <div class="hd" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px">
      <h3 style="margin:0">Failure Categories</h3>
      <span class="mono" style="color:var(--muted2);font-size:11px">${g.nFail} total · glow render</span></div>
    <div class="bd"><div class="barglow-wrap"><svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="barGlow" x="-50%" y="-20%" width="200%" height="140%">
          <feGaussianBlur stdDeviation="6" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <line x1="${padL}" y1="${h-padB}" x2="${w-padR}" y2="${h-padB}" stroke="var(--hair)" stroke-width="1"/>
      ${bars}
    </svg></div></div></div>`;
}

function analyticsView(){
  const g=agg();
  return `<div class="viewpad">
    ${heroPerf(g)}
    <div class="bento" style="margin-top:0">${donut(g.dist)}${histCurve(g.hist)}${perfChart()}</div>
    ${statsBar(g)}
    <div class="featured">
      ${funnelWidget()}
      ${statCardWidget()}
      ${radarWidget()}
      ${hudWidget()}
      ${barGlowWidget()}
    </div>
  </div>`;
}

/* ---------- orchestration ---------- */
function countUp(el){
  const tgt=parseFloat(el.dataset.count);if(isNaN(tgt))return;
  const dec=el.dataset.dec?+el.dataset.dec:0,suf=el.dataset.suffix||'',dur=850,t0=performance.now();
  (function f(t){const k=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-k,3);el.textContent=(tgt*e).toFixed(dec)+suf;if(k<1)requestAnimationFrame(f);})(t0);
}
function afterRender(animate){
  const v=document.getElementById('view'),go=animate&&!prefersReduced;
  v.querySelectorAll('path.draw,circle.draw').forEach(p=>{
    const off=p.dataset.off||'0',len=p.dataset.len||'100';
    if(go){p.style.transition='none';p.style.strokeDashoffset=len;
      requestAnimationFrame(()=>requestAnimationFrame(()=>{p.style.transition='';p.style.strokeDashoffset=off;}));}
    else{p.style.strokeDashoffset=off;}
  });
  v.querySelectorAll('.bar2 i[data-w]').forEach(b=>{const w=b.dataset.w+'%';
    if(go){b.style.width='0';requestAnimationFrame(()=>requestAnimationFrame(()=>b.style.width=w));}else b.style.width=w;});
  v.querySelectorAll('[data-count]').forEach(el=>{
    if(go)countUp(el);
    else{const dec=el.dataset.dec?+el.dataset.dec:0;el.textContent=parseFloat(el.dataset.count).toFixed(dec)+(el.dataset.suffix||'');}
  });
}
function mount(animate){
  const v=document.getElementById('view');
  v.innerHTML = S.view==='runs'?runsView():S.view==='meta'?metaView():S.view==='drift'?driftView():analyticsView();
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===S.view));
  if(animate){v.classList.remove('anim');void v.offsetWidth;v.classList.add('anim');}
  afterRender(animate);
}
function setView(v){S.view=v;S.stepId=null;mount(true);}
function pickRun(id){S.runId=id;S.stepId=null;S.snip='evidence';S.view='runs';mount(true);}
function pickStep(id){S.stepId=S.stepId===id?null:id;mount(false);}
function toggleTheme(){const r=document.documentElement;r.dataset.theme=r.dataset.theme==='dark'?'light':'dark';}
function exportReport(){
  const run=runById(S.runId);if(!run)return;
  const blob=new Blob([JSON.stringify(run.attribution,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=run.run_id+'.json';a.click();URL.revokeObjectURL(u);
}
mount(true);

/* ---------- Motion-driven brand underline: hover-morph between two wavy paths ---------- */
(function initBrandUnderline(){
  const M = window.Motion; if(!M) return;
  const path = document.getElementById('brandPath');
  const brand = document.querySelector('.brand');
  if(!path || !brand || prefersReduced) return;
  const REST  = "M 1,3 Q 15,1 30,3 Q 45,5 59,3";
  const HOVER = "M 1,3 Q 15,5 30,3 Q 45,1 59,3";
  brand.addEventListener('mouseenter', () => {
    M.animate(path, { d: HOVER }, { duration: .55, ease: [.4, 0, .2, 1] });
  });
  brand.addEventListener('mouseleave', () => {
    M.animate(path, { d: REST }, { duration: .55, ease: [.4, 0, .2, 1] });
  });
})();
</script>
