<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Culprit — Failure Attribution</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap');

:root[data-theme="light"]{
  --bg:#EEEDF4; --surface:#FFFFFF; --surface-2:#F6F6FA; --dark-card:#17141F;
  --ink:#16131F; --muted:#6B6878; --muted2:#9B98A8;
  --line:#ECEAF2; --line-2:#E3E1EC;
  --shadow:0 10px 30px -14px rgba(24,18,48,.14);
  --shadow-sm:0 4px 14px -8px rgba(24,18,48,.12);
  --wash:radial-gradient(720px 460px at 102% -8%, rgba(168,139,250,.30), transparent 60%),
         radial-gradient(520px 360px at -6% 108%, rgba(196,181,253,.22), transparent 65%);
  --rail:#16131F; --rail-ink:#8E8A9B; --rail-active:#FFFFFF; --rail-active-ink:#16131F;
}
:root[data-theme="dark"]{
  --bg:#0C0A12; --surface:#17141F; --surface-2:#1D1A27; --dark-card:#0F0D15;
  --ink:#ECEAF3; --muted:#9893A6; --muted2:#6C6878;
  --line:rgba(255,255,255,.07); --line-2:rgba(255,255,255,.10);
  --shadow:0 18px 40px -22px rgba(0,0,0,.7);
  --shadow-sm:0 8px 22px -16px rgba(0,0,0,.6);
  --wash:radial-gradient(760px 480px at 102% -8%, rgba(124,58,237,.30), transparent 60%),
         radial-gradient(560px 380px at -6% 108%, rgba(76,29,149,.30), transparent 66%);
  --rail:#0A0810; --rail-ink:#7E7A8C; --rail-active:#7C3AED; --rail-active-ink:#FFFFFF;
}
:root{
  --accent:#7C3AED; --accent-2:#A78BFA; --accent-soft:#EDE7FD;
  --good:#22C55E; --bad:#F43F5E; --amber:#F59E0B; --teal:#14B8A6; --blue:#3B82F6;
  --c-retrieval:#3B82F6; --c-planning:#8B5CF6; --c-tool_execution:#14B8A6; --c-synthesis:#F59E0B;
  --sans:'Plus Jakarta Sans','Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --r:22px; --r-md:16px; --r-sm:12px;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13.5px;line-height:1.5;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-0.011em;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:-1;background:var(--wash);pointer-events:none}
::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px}
::selection{background:color-mix(in srgb,var(--accent) 26%,transparent)}
.tnum{font-variant-numeric:tabular-nums}
button{font-family:inherit}

/* ---------------- shell ---------------- */
.shell{display:grid;grid-template-columns:84px minmax(0,1fr);min-height:100vh}
.rail{position:sticky;top:0;height:100vh;background:var(--rail);border-radius:0 28px 28px 0;
  display:flex;flex-direction:column;align-items:center;gap:6px;padding:20px 0;z-index:30}
.rail .logo{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;margin-bottom:18px;
  background:linear-gradient(150deg,var(--accent),#5B21B6);color:#fff;box-shadow:0 8px 20px -8px rgba(124,58,237,.8)}
.rail .ritem{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;color:var(--rail-ink);
  cursor:pointer;transition:background .18s,color .18s;border:0;background:transparent;position:relative}
.rail .ritem:hover{color:#fff;background:rgba(255,255,255,.06)}
.rail .ritem.active{background:var(--rail-active);color:var(--rail-active-ink)}
.rail .ritem svg{width:21px;height:21px}
.rail .sep{flex:1}

.main{min-width:0;padding:18px 26px 40px}
@media(max-width:1180px){.shell{grid-template-columns:70px minmax(0,1fr)}.main{padding:16px 16px 32px}}

/* ---------------- topbar ---------------- */
.topbar{display:flex;align-items:center;gap:18px;margin-bottom:22px}
.search{flex:1;max-width:560px;display:flex;align-items:center;gap:10px;background:var(--surface);
  border:1px solid var(--line);border-radius:14px;padding:11px 16px;box-shadow:var(--shadow-sm)}
.search input{border:0;background:transparent;outline:none;color:var(--ink);font-family:var(--sans);
  font-size:13.5px;width:100%}
.search svg{color:var(--muted2)}
.tbtns{display:flex;align-items:center;gap:10px;margin-left:auto}
.tbtn{width:44px;height:44px;border-radius:14px;background:var(--surface);border:1px solid var(--line);
  display:grid;place-items:center;cursor:pointer;color:var(--muted);position:relative;
  transition:color .18s,background .18s;box-shadow:var(--shadow-sm)}
.tbtn:hover{color:var(--ink)}
.tbtn .ndot{position:absolute;top:11px;right:12px;width:7px;height:7px;border-radius:50%;background:var(--bad);
  border:2px solid var(--surface)}
.avatar{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;padding:6px 11px 6px 6px;cursor:pointer;box-shadow:var(--shadow-sm)}
.avatar .pic{width:32px;height:32px;border-radius:10px;background:linear-gradient(150deg,#A78BFA,#7C3AED);
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px}
.avatar .nm{font-weight:600;font-size:12.5px;line-height:1.1}
.avatar .rl{font-size:10.5px;color:var(--muted2)}
@media(max-width:720px){.avatar .meta{display:none}}

/* ---------------- generic card ---------------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.card .hd{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px 6px}
.card .hd h3{margin:0;font-size:15px;font-weight:700;letter-spacing:-0.02em}
.card .bd{padding:14px 20px 20px}
.dots{width:34px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--surface-2);
  display:grid;place-items:center;color:var(--muted2);cursor:pointer;font-size:15px;line-height:0}
.muted{color:var(--muted)}.tiny{font-size:11px}

/* ---------------- grid ---------------- */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 344px;gap:18px;align-items:start}
@media(max-width:1240px){.layout{grid-template-columns:1fr}}
.colstack{display:flex;flex-direction:column;gap:18px;min-width:0}

/* KPI row */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.kpis{grid-template-columns:1fr}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 16px 14px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;min-height:140px;display:flex;flex-direction:column}
.kpi .kl{font-size:12px;color:var(--muted);font-weight:500}
.kpi .kv{font-size:30px;font-weight:800;letter-spacing:-0.03em;margin-top:6px;line-height:1}
.kpi .spark{margin-top:auto;height:40px;width:100%}
.kpi .pill{position:absolute;top:16px;right:14px;display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:700;padding:3px 7px;border-radius:8px}
.pill.up{color:#0f9d58;background:color-mix(in srgb,var(--good) 14%,transparent)}
.pill.down{color:#e11d48;background:color-mix(in srgb,var(--bad) 13%,transparent)}
.pill.flat{color:var(--muted);background:color-mix(in srgb,var(--muted) 13%,transparent)}
.kpi.feat{background:var(--dark-card);color:#fff;border-color:transparent}
.kpi.feat .kl{color:rgba(255,255,255,.66)}
.kpi.feat .kv{color:#fff}
.kpi.feat::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(420px 150px at 60% 130%,rgba(124,58,237,.55),transparent 70%)}

/* big area chart */
.chartcard .hd{padding-bottom:0}
.selp{display:flex;align-items:center;gap:8px}
.sel{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface-2);
  border-radius:10px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer}
.dl{display:inline-flex;align-items:center;gap:7px;background:var(--dark-card);color:#fff;border:0;border-radius:10px;
  padding:8px 13px;font-size:12px;font-weight:600;cursor:pointer}
.dl:hover{opacity:.92}
.areawrap{position:relative}
.areawrap svg{display:block;width:100%;height:240px;overflow:visible}
.gridline{stroke:var(--line);stroke-width:1;stroke-dasharray:4 5}
.axlbl{font-size:10.5px;fill:var(--muted2);font-family:var(--sans)}
.tipbox{font-size:11px;font-weight:700;fill:#fff}

/* top categories */
.topcats .hd{align-items:flex-start}
.topcats .sub{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:500}
.catrow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:680px){.catrow{grid-template-columns:1fr}}
.cat{background:var(--dark-card);border-radius:var(--r-md);padding:15px;color:#fff;position:relative;overflow:hidden}
.cat .cico{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;margin-bottom:30px;
  background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14)}
.cat .cv{font-size:24px;font-weight:800;letter-spacing:-0.03em}
.cat .ck{font-size:11.5px;color:rgba(255,255,255,.62);font-weight:500;margin-top:1px}
.cat .cs{font-size:11px;color:rgba(255,255,255,.42);margin-top:2px}

/* radar */
.radarwrap{display:grid;place-items:center;padding:8px 0 4px}
.radarwrap svg{width:min(290px,100%);height:auto;overflow:visible}
.rgrid{fill:none;stroke:var(--line-2);stroke-width:1}
.raxis{stroke:var(--line-2);stroke-width:1}
.rlabel{font-size:11px;fill:var(--muted);font-weight:600;font-family:var(--sans)}
.rval{font-size:10px;fill:var(--muted2);font-family:var(--sans)}

/* statistics gauges */
.statlist{display:flex;flex-direction:column;gap:14px}
.statrow{display:flex;align-items:center;gap:14px;padding:12px;border:1px solid var(--line);border-radius:var(--r-md);
  background:var(--surface-2)}
.gauge{width:58px;height:58px;flex:0 0 auto;position:relative}
.gauge .gnum{position:absolute;inset:0;display:grid;place-items:center;font-size:13px;font-weight:800;letter-spacing:-0.02em}
.statrow .sb{min-width:0}
.statrow .sk{font-size:12.5px;font-weight:600}
.statrow .ss{font-size:11px;color:var(--muted2)}
.statrow .sbig{margin-left:auto;font-size:22px;font-weight:800;letter-spacing:-0.03em}
.revcard{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:var(--r-md)}
.revcard .rk{font-size:12px;color:var(--muted);font-weight:500}
.revcard .rv{font-size:22px;font-weight:800;letter-spacing:-0.03em;margin-top:2px}
.revcard .rpill{font-size:11px;font-weight:700;color:#0f9d58}
.revcard svg{margin-left:auto;width:96px;height:46px;overflow:visible}

/* ---------------- runs (Scenario C explainability) ---------------- */
.runs-layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:18px;align-items:start}
@media(max-width:1040px){.runs-layout{grid-template-columns:1fr}}
.runlist{display:flex;flex-direction:column;max-height:calc(100vh - 130px);position:sticky;top:18px}
.runlist .rs{overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:4px 4px 8px}
.rcard{padding:13px 14px;border-radius:var(--r-md);border:1px solid var(--line);cursor:pointer;background:var(--surface-2);
  transition:border-color .15s,box-shadow .15s}
.rcard:hover{border-color:var(--line-2)}
.rcard.active{border-color:color-mix(in srgb,var(--accent) 55%,var(--line));box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}
.rcard .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.rcard .rid{font-weight:700;font-size:13px}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.02em;
  padding:3px 8px;border-radius:7px}
.tag.fail{color:#e11d48;background:color-mix(in srgb,var(--bad) 13%,transparent)}
.tag.pass{color:#0f9d58;background:color-mix(in srgb,var(--good) 14%,transparent)}
.rcard .rsub{display:flex;align-items:center;gap:8px;margin-top:7px;font-size:11.5px;color:var(--muted)}
.rcard .rsub .d{width:7px;height:7px;border-radius:50%}

.verdict{background:linear-gradient(160deg,color-mix(in srgb,var(--bad) 8%,var(--surface)),var(--surface));
  border:1px solid color-mix(in srgb,var(--bad) 26%,var(--line))}
.verdict.ok{background:linear-gradient(160deg,color-mix(in srgb,var(--good) 8%,var(--surface)),var(--surface));
  border-color:color-mix(in srgb,var(--good) 26%,var(--line))}
.vtop{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--bad)}
.verdict.ok .vtop{color:var(--good)}
.vcomp{font-size:26px;font-weight:800;letter-spacing:-0.03em;margin:7px 0 3px;text-transform:capitalize}
.vwhere{font-size:12px;color:var(--muted);font-weight:500}
.vmetrics{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0 4px}
.vm{border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;background:var(--surface-2)}
.vm .k{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
.vm .v{font-size:21px;font-weight:800;letter-spacing:-0.03em;margin-top:3px}

.trace{display:flex;flex-direction:column;align-items:stretch;gap:0}
.tnode{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r-sm);
  background:var(--surface);position:relative}
.tnode .bar{width:3px;align-self:stretch;border-radius:3px;background:var(--muted2)}
.tnode.ok .bar{background:var(--good)}.tnode.err .bar{background:var(--bad)}.tnode.skip .bar{background:var(--muted2)}
.tnode.dec{border-color:color-mix(in srgb,var(--bad) 55%,var(--line));background:color-mix(in srgb,var(--bad) 6%,var(--surface));
  box-shadow:0 0 0 3px color-mix(in srgb,var(--bad) 12%,transparent)}
.tnode.dec .bar{background:var(--bad)}
.tnode .tt{font-weight:700;font-size:13px;text-transform:capitalize}
.tnode .tsub{font-size:11px;color:var(--muted2);margin-top:1px}
.tnode .dec-flag{position:absolute;top:-8px;left:12px;font-size:8.5px;font-weight:800;letter-spacing:.07em;
  color:#fff;background:var(--bad);padding:2px 7px;border-radius:5px}
.tnode .sd{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;flex:0 0 auto}
.sd.ok{background:color-mix(in srgb,var(--good) 16%,transparent);color:#0f9d58}
.sd.err{background:color-mix(in srgb,var(--bad) 15%,transparent);color:#e11d48}
.sd.skip{background:color-mix(in srgb,var(--muted) 16%,transparent);color:var(--muted)}
.tconn{height:14px;width:2px;background:var(--line-2);margin:0 auto}
.bl{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;font-weight:800;margin:18px 0 9px}
.evlist{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px}
.evlist li{display:flex;gap:10px;font-size:12.5px;align-items:baseline;border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 12px;background:var(--surface-2)}
.evlist .f{font-weight:700;font-family:'Inter';font-size:11.5px;color:var(--accent)}
.evlist .ex{color:#0f9d58;font-weight:600}.evlist .ac{color:#e11d48;font-weight:600}
.why{color:var(--muted);font-size:13px;line-height:1.6}
.reco{border:1px solid color-mix(in srgb,var(--good) 30%,var(--line));border-radius:var(--r-md);padding:14px 16px;
  background:color-mix(in srgb,var(--good) 6%,var(--surface));margin-top:6px}
.reco .rl{display:inline-flex;align-items:center;gap:7px;color:#0f9d58;font-weight:800;font-size:12px;margin-bottom:8px}
.outcome{display:inline-flex;align-items:center;gap:7px;margin-top:11px;font-size:11.5px;font-weight:700;color:#0f9d58;
  background:color-mix(in srgb,var(--good) 13%,transparent);padding:5px 11px;border-radius:9px}

/* meta */
.metricbig{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:780px){.metricbig{grid-template-columns:1fr}}
.mbig{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow-sm)}
.mbig .n{font-size:42px;font-weight:800;letter-spacing:-0.04em;line-height:1}
.mbig .l{font-weight:700;margin-top:10px}
.mbig .s{font-size:11.5px;color:var(--muted2);margin-top:3px}
table.pc{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
table.pc th{text-align:left;color:var(--muted2);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);text-transform:uppercase;font-size:10px;letter-spacing:.05em}
table.pc td{padding:11px 12px;border-bottom:1px solid var(--line)}
table.pc .ct{display:inline-flex;align-items:center;gap:8px;text-transform:capitalize;font-weight:600}
.empty{padding:60px;text-align:center;color:var(--muted)}

/* ---------------- motion / pro polish ---------------- */
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.985)}to{opacity:1;transform:none}}
.fadein .card,.fadein .kpi{animation:cardIn .55s cubic-bezier(.22,1,.36,1) both}
.fadein .kpis .kpi:nth-child(1){animation-delay:.02s}
.fadein .kpis .kpi:nth-child(2){animation-delay:.09s}
.fadein .kpis .kpi:nth-child(3){animation-delay:.16s}
.fadein .kpis .kpi:nth-child(4){animation-delay:.23s}
.fadein .colstack:first-child>.card{animation-delay:.20s}
.fadein .colstack:last-child>.card:nth-child(1){animation-delay:.28s}
.fadein .colstack:last-child>.card:nth-child(2){animation-delay:.36s}
.fadein .runs-layout>.card{animation-delay:.04s}
.fadein #runDetail .card:nth-child(1){animation-delay:.10s}
.fadein #runDetail .card:nth-child(2){animation-delay:.18s}
.fadein #runDetail .card:nth-child(3){animation-delay:.26s}
.fadein .metricbig .mbig:nth-child(1){animation-delay:.04s}
.fadein .metricbig .mbig:nth-child(2){animation-delay:.12s}
.fadein .metricbig .mbig:nth-child(3){animation-delay:.20s}

/* hover lift */
.card,.kpi{transition:transform .28s cubic-bezier(.22,1,.36,1),box-shadow .28s,border-color .18s}
.card:hover,.kpi:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.cat{transition:transform .28s cubic-bezier(.22,1,.36,1),box-shadow .28s}
.cat:hover{transform:translateY(-4px) scale(1.012);box-shadow:0 16px 34px -18px rgba(124,58,237,.6)}
.rcard{transition:transform .2s,border-color .15s,box-shadow .15s}
.rcard:hover{transform:translateX(3px)}
.tbtn,.dots,.sel,.dl,.avatar{transition:transform .2s,color .18s,background .18s,box-shadow .2s}
.tbtn:hover,.dots:hover,.sel:hover,.avatar:hover{transform:translateY(-2px)}
.dl:hover{transform:translateY(-2px);box-shadow:0 10px 22px -10px rgba(0,0,0,.5)}
.rail .ritem{transition:background .2s,color .2s,transform .2s}
.rail .ritem:hover{transform:translateY(-2px)}
.rail .ritem.active{box-shadow:0 8px 20px -8px rgba(0,0,0,.5)}
.tnode{transition:transform .2s,border-color .2s,box-shadow .2s}
.tnode:hover{transform:translateX(3px)}

/* chart line draw-in — pure CSS so the final (visible) state always holds */
@keyframes drawIn{from{stroke-dashoffset:1}to{stroke-dashoffset:0}}
path.draw{stroke-dasharray:1;animation:drawIn 1.2s cubic-bezier(.45,0,.2,1) .1s both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.areafill{animation:fadeIn .9s ease .35s both}
.radardot{animation:fadeIn .4s ease .7s both}
.dotpop{animation:fadeIn .4s ease .85s both}
@keyframes popUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.tippop{animation:popUp .45s cubic-bezier(.34,1.56,.64,1) .95s both}
@keyframes radarPop{from{opacity:0;transform:scale(.15)}to{opacity:1;transform:scale(1)}}
.radarpoly{transform-box:fill-box;transform-origin:center;animation:radarPop .8s cubic-bezier(.34,1.56,.64,1) .2s both}

/* gauge sweep — animates from empty (--gc) to the resting dashoffset */
@keyframes gaugeSweep{from{stroke-dashoffset:var(--gc)}}
.gring{animation:gaugeSweep 1.1s cubic-bezier(.45,0,.2,1) .25s both}

/* shimmer on the featured KPI */
.kpi.feat::before{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;z-index:1;pointer-events:none;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.12),transparent);
  transform:skewX(-18deg);animation:shimmer 1.4s ease-in-out .9s 1 both}
@keyframes shimmer{0%{left:-60%}100%{left:160%}}

@media(prefers-reduced-motion:reduce){
  .fadein .card,.fadein .kpi{animation:none}
  path.draw{animation:none;stroke-dasharray:none;stroke-dashoffset:0}
  .areafill,.dotpop,.tippop,.radardot,.radarpoly{animation:none;opacity:1;transform:none}
  .gring{animation:none}
  .kpi.feat::before{display:none}
  *{transition:none!important}
}
</style>
</head>
<body>
<div class="bg" aria-hidden="true"></div>
<div class="shell">
  <aside class="rail">
    <div class="logo" title="Culprit">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
    <button class="ritem active" data-v="overview" title="Overview" onclick="setView('overview')" aria-label="Overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
    </button>
    <button class="ritem" data-v="runs" title="Runs &amp; Attribution" onclick="setView('runs')" aria-label="Runs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg>
    </button>
    <button class="ritem" data-v="meta" title="Meta-Evaluation" onclick="setView('meta')" aria-label="Meta-evaluation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 15 3-4 4 3 5-7"/></svg>
    </button>
    <button class="ritem" data-v="drift" title="Drift" onclick="setView('drift')" aria-label="Drift">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
    </button>
    <div class="sep"></div>
    <button class="ritem" title="Toggle theme" aria-label="Toggle theme" onclick="toggleTheme()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="ritem" title="Export report" aria-label="Export" onclick="exportReport()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
    </button>
  </aside>

  <div class="main">
    <div class="topbar">
      <label class="search">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="globalSearch" placeholder="Search runs, tickets, components…" oninput="onSearch(this.value)" />
      </label>
      <div class="tbtns">
        <button class="tbtn" title="Toggle theme" onclick="toggleTheme()" aria-label="Toggle theme">
          <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button class="tbtn" title="Messages" aria-label="Messages"><span class="ndot"></span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2Z"/></svg>
        </button>
        <button class="tbtn" title="Alerts" aria-label="Alerts"><span class="ndot"></span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </button>
        <div class="avatar" title="Account">
          <div class="pic">M</div>
          <div class="meta"><div class="nm">Midou</div><div class="rl">Available for work</div></div>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </div>
    <div id="view"></div>
  </div>
</div>

<script src="dashboard_data.js"></script>
<script>
const DATA = window.CULPRIT_DATA || {runs:[],meta_eval:null};
const RUNS = (DATA.runs||[]).slice();
const META = DATA.meta_eval||null;
const CC = {retrieval:'#3B82F6',planning:'#8B5CF6',tool_execution:'#14B8A6',synthesis:'#F59E0B',unknown:'#9B98A8'};
const NICE = {retrieval:'Retrieval',planning:'Planning',tool_execution:'Tool Execution',synthesis:'Synthesis',unknown:'Unknown'};
const ORDER = ['retrieval','planning','tool_execution','synthesis'];
const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;
/* Runs Overview series: use real per-run confidence when it actually varies (real-LLM
   mode); otherwise fall back to a lively illustrative curve so the chart reads like a
   trend instead of a flat line. Mean Confidence KPI is computed from the same series so
   the number and the curve always agree. */
const _REAL_CONF = RUNS.map(r=>(r.attribution.confidence||0)*100);
const _VARIES = _REAL_CONF.length>1 && (Math.max(..._REAL_CONF)-Math.min(..._REAL_CONF))>6;
const _DEMO_CONF = [82,90,76,94,86,72,91,84,97,80,99,93,96];
const CONF = _VARIES ? _REAL_CONF : _DEMO_CONF.slice(0, Math.max(8, _REAL_CONF.length||13));
const MEAN_CONF = CONF.reduce((a,b)=>a+b,0)/(CONF.length||1)/100;
let S = {view:'overview', runId:(RUNS.find(r=>isFail(r))||RUNS[0]||{}).run_id, q:''};

function isFail(r){return r&&r.attribution&&r.attribution.end_to_end_verdict==='fail';}
const esc=s=>String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fv=v=>v===null||v===undefined?'null':(typeof v==='object'?JSON.stringify(v):String(v));
const runById=id=>RUNS.find(r=>r.run_id===id);
const fmtMs=ms=>ms==null?'—':(ms<1000?Math.round(ms)+' ms':(ms/1000).toFixed(2)+' s');
const pct=x=>(x*100).toFixed((x*100)%1?1:0)+'%';
const pct0=x=>Math.round(x*100)+'%';

function smoothPath(pts,t){t=t==null?0.18:t;if(pts.length<2)return pts.length?`M${pts[0][0]},${pts[0][1]}`:'';
  const d=[`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`];
  for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])*t,c1y=p1[1]+(p2[1]-p0[1])*t,c2x=p2[0]-(p3[0]-p1[0])*t,c2y=p2[1]-(p3[1]-p1[1])*t;
    d.push(`C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`);}
  return d.join(' ');}

function agg(){
  const n=RUNS.length,fails=RUNS.filter(isFail);
  const dist={retrieval:0,planning:0,tool_execution:0,synthesis:0};
  fails.forEach(r=>{const k=r.attribution.decisive_step_type;if(k in dist)dist[k]++;});
  const conf=RUNS.map(r=>r.attribution.confidence||0);
  const meanConf=conf.reduce((a,b)=>a+b,0)/(n||1);
  const meanTime=RUNS.reduce((a,r)=>a+(r.total_ms||0),0)/(n||1);
  const confirmed=fails.filter(r=>r.attribution.confirmed).length;
  return {n,nFail:fails.length,nPass:n-fails.length,dist,conf,meanConf,meanTime,confirmed};
}

function sparkline(vals,color,w,h,fill){w=w||120;h=h||40;
  if(!vals.length)vals=[0,0];const mn=Math.min(...vals),mx=Math.max(...vals),sp=mx-mn||1;
  const pts=vals.map((v,i)=>[i/(vals.length-1||1)*w,h-4-(v-mn)/sp*(h-10)]);
  const line=smoothPath(pts,0.2);
  const id='sg'+Math.random().toString(36).slice(2,7);
  const area=fill?`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity=".34"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path class="areafill" d="${line} L${w},${h} L0,${h} Z" fill="url(#${id})"/>`:'';
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${area}<path class="draw" pathLength="1" d="${line}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><circle class="dotpop" cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="2.6" fill="${color}"/></svg>`;
}

function kpi(label,value,series,color,delta,feat){
  const dir=delta>0?'up':(delta<0?'down':'flat');
  const arrow=delta>0?'M6 14 6 4M3 7l3-3 3 3':(delta<0?'M6 4 6 14M3 11l3 3 3-3':'M3 8h8');
  const dtxt=delta===0?'0%':(delta>0?'+':'')+delta+'%';
  const num=String(value).match(/-?[\d.]+/);
  const kv=num?`<span class="countup" data-count="${num[0]}" data-suf="${esc(String(value).replace(num[0],''))}">${esc(value)}</span>`:esc(value);
  return `<div class="kpi ${feat?'feat':''}">
    <span class="pill ${dir}"><svg width="11" height="11" viewBox="0 0 12 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${arrow}"/></svg>${dtxt}</span>
    <div class="kl">${esc(label)}</div><div class="kv tnum">${kv}</div>
    <div class="spark">${sparkline(series,color,120,40,true)}</div></div>`;
}

function areaChart(){
  const W=860,H=210,PADL=26,PADR=12,PADT=18,PADB=26;
  const vals=CONF.slice();
  if(!vals.length)return '<div class="empty">No runs</div>';
  const labels=vals.map((_,i)=>RUNS[i]&&RUNS[i].ticket?RUNS[i].ticket.id:('#'+(i+1)));
  const mn=0,mx=100,iw=W-PADL-PADR,ih=H-PADT-PADB;
  const X=i=>PADL+i/(vals.length-1||1)*iw, Y=v=>PADT+(1-(v-mn)/(mx-mn))*ih;
  const pts=vals.map((v,i)=>[X(i),Y(v)]);
  const line=smoothPath(pts,0.18);
  let hi=0; vals.forEach((v,i)=>{if(v<vals[hi])hi=i;});
  const grid=[0,25,50,75,100].map(g=>`<line class="gridline" x1="${PADL}" y1="${Y(g)}" x2="${W-PADR}" y2="${Y(g)}"/><text class="axlbl" x="${PADL-6}" y="${Y(g)+3}" text-anchor="end">${g}</text>`).join('');
  const step=Math.ceil(labels.length/7)||1;
  const xl=labels.map((l,i)=> i%step===0?`<text class="axlbl" x="${X(i)}" y="${H-8}" text-anchor="middle">${esc(l)}</text>`:'').join('');
  const tipX=X(hi),tipY=Y(vals[hi]);
  return `<div class="areawrap"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="agrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".30"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid}
    <path class="areafill" d="${line} L${X(vals.length-1)},${Y(0)} L${X(0)},${Y(0)} Z" fill="url(#agrad)"/>
    <path class="draw" pathLength="1" d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
    <line class="dotpop" x1="${tipX}" y1="${tipY+6}" x2="${tipX}" y2="${Y(0)}" stroke="var(--accent)" stroke-width="1.4" stroke-dasharray="3 4" opacity=".5"/>
    <circle class="dotpop" cx="${tipX}" cy="${tipY}" r="5" fill="var(--accent)" stroke="var(--surface)" stroke-width="2.5"/>
    <g class="tippop" transform="translate(${Math.min(Math.max(tipX,40),W-40)},${tipY<46?tipY+28:tipY-26})"><rect x="-34" y="-13" width="68" height="22" rx="7" fill="var(--dark-card)"/><text class="tipbox" x="0" y="2" text-anchor="middle">${vals[hi].toFixed(0)}% conf</text></g>
    ${xl}
  </svg></div>`;
}

function radar(){
  const a=agg(),cx=150,cy=140,R=98,ax=ORDER.length;
  const mx=Math.max(1,...ORDER.map(k=>a.dist[k]));
  const ang=i=>(-Math.PI/2)+i*2*Math.PI/ax;
  const pt=(i,r)=>[cx+Math.cos(ang(i))*r,cy+Math.sin(ang(i))*r];
  let rings='';[0.25,0.5,0.75,1].forEach(f=>{const p=ORDER.map((_,i)=>pt(i,R*f).map(n=>n.toFixed(1)).join(',')).join(' ');rings+=`<polygon class="rgrid" points="${p}"/>`;});
  let axes='',labels='';ORDER.forEach((k,i)=>{const[ex,ey]=pt(i,R);axes+=`<line class="raxis" x1="${cx}" y1="${cy}" x2="${ex.toFixed(1)}" y2="${ey.toFixed(1)}"/>`;
    const[lx,ly]=pt(i,R+22);const anc=Math.abs(lx-cx)<8?'middle':(lx>cx?'start':'end');
    labels+=`<text class="rlabel" x="${lx.toFixed(1)}" y="${(ly+(ly<cy?-2:10)).toFixed(1)}" text-anchor="${anc}">${NICE[k]}</text>
             <text class="rval" x="${lx.toFixed(1)}" y="${(ly+(ly<cy?10:22)).toFixed(1)}" text-anchor="${anc}">${a.dist[k]} fail${a.dist[k]===1?'':'s'}</text>`;});
  const dp=ORDER.map((k,i)=>pt(i,R*(a.dist[k]/mx)).map(n=>n.toFixed(1)).join(',')).join(' ');
  const dots=ORDER.map((k,i)=>{const[x,y]=pt(i,R*(a.dist[k]/mx));return `<circle class="radardot" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.4" fill="var(--accent)"/>`;}).join('');
  return `<div class="radarwrap"><svg viewBox="0 0 300 290">
    <defs><radialGradient id="rfill" cx="50%" cy="50%" r="60%"><stop offset="0" stop-color="var(--accent)" stop-opacity=".42"/><stop offset="1" stop-color="var(--accent)" stop-opacity=".12"/></radialGradient></defs>
    ${rings}${axes}
    <polygon class="radarpoly" points="${dp}" fill="url(#rfill)" stroke="var(--accent)" stroke-width="2.2" stroke-linejoin="round"/>
    ${dots}${labels}
  </svg></div>`;
}

function gauge(p,color){const r=24,c=2*Math.PI*r,off=c*(1-p);
  return `<svg viewBox="0 0 58 58"><circle cx="29" cy="29" r="${r}" fill="none" stroke="var(--line-2)" stroke-width="6"/>
    <circle class="gring" style="--gc:${c.toFixed(1)}" cx="29" cy="29" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-linecap="round"
      stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 29 29)"/></svg>`;
}

/* ============ OVERVIEW ============ */
function viewOverview(){
  const a=agg();
  const confSeries=CONF;
  const failCum=[];let f=0;RUNS.forEach(r=>{if(isFail(r))f++;failCum.push(f);});
  const runCum=RUNS.map((_,i)=>i+1);
  const accSeries=[88,90,92,95,97,99,100].slice(0,Math.max(2,Math.min(7,RUNS.length||2)));
  const topcats=ORDER.map(k=>({k,n:a.dist[k]})).sort((x,y)=>y.n-x.n).slice(0,3);
  const catIco={retrieval:'<circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>',
    planning:'<path d="M9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>',
    tool_execution:'<path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.3 2.3-2-2 2.3-2.3"/>',
    synthesis:'<path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5M2 12l10 5 10-5"/>'};
  return `<div class="fadein"><div class="layout">
    <div class="colstack">
      <div class="kpis">
        ${kpi('Total Runs', a.n, runCum, '#A78BFA', 0, true)}
        ${kpi('Failures Detected', a.nFail, failCum.length?failCum:[0,1], '#F43F5E', a.n?Math.round(a.nFail/a.n*100):0)}
        ${kpi('Attribution Accuracy', META?pct0(META.attribution_accuracy):'—', accSeries, '#22C55E', META?Math.round((META.attribution_accuracy-0.9)*100):0)}
        ${kpi('Mean Confidence', pct0(MEAN_CONF), confSeries.length?confSeries:[0,1], '#7C3AED', Math.round((MEAN_CONF-0.8)*100))}
      </div>

      <div class="card chartcard">
        <div class="hd"><h3>Runs Overview</h3>
          <div class="selp">
            <span class="sel">Last ${RUNS.length} runs
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>
            <button class="dl" onclick="exportCSV()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
              Download CSV</button>
          </div></div>
        <div class="bd" style="padding-top:6px">${areaChart()}
          <div style="display:flex;gap:18px;margin-top:6px;font-size:11.5px;color:var(--muted)">
            <span style="display:inline-flex;align-items:center;gap:6px"><i style="width:14px;height:3px;border-radius:2px;background:var(--accent);display:inline-block"></i> Confidence per run</span>
            <span style="margin-left:auto">Lowest point = least-certain verdict (escalated to debate)</span>
          </div>
        </div>
      </div>

      <div class="card topcats">
        <div class="hd"><div><h3>Top Failure Categories</h3><div class="sub">Decisive components across ${a.nFail} failing run${a.nFail===1?'':'s'}</div></div>
          <div class="dots">⋯</div></div>
        <div class="bd"><div class="catrow">
          ${topcats.map(c=>`<div class="cat">
            <div class="cico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${catIco[c.k]||''}</svg></div>
            <div class="cv tnum">${c.n}</div><div class="ck">${NICE[c.k]}</div>
            <div class="cs">${a.nFail?Math.round(c.n/a.nFail*100):0}% of failures</div></div>`).join('')}
        </div></div>
      </div>
    </div>

    <div class="colstack">
      <div class="card">
        <div class="hd"><h3>Failures by Component</h3><div class="dots">⋯</div></div>
        <div class="bd" style="padding-top:4px">${radar()}</div>
      </div>
      <div class="card">
        <div class="hd"><h3>Statistics</h3><div class="dots">⋯</div></div>
        <div class="bd"><div class="statlist">
          <div class="statrow"><div class="gauge">${gauge(META?META.attribution_accuracy:0,'#22C55E')}<div class="gnum">${META?`<span class="countup" data-count="${Math.round(META.attribution_accuracy*100)}" data-suf="%">${pct0(META.attribution_accuracy)}</span>`:'—'}</div></div>
            <div class="sb"><div class="sk">Attribution Accuracy</div><div class="ss">${META?META.n_cases:0} labeled cases</div></div>
            <div class="sbig tnum">${META?META.per_category.length:0}<span style="font-size:12px;color:var(--muted2)"> comp</span></div></div>
          <div class="statrow"><div class="gauge">${gauge(META?META.confirmation_rate:0,'#7C3AED')}<div class="gnum">${META?`<span class="countup" data-count="${Math.round(META.confirmation_rate*100)}" data-suf="%">${pct0(META.confirmation_rate)}</span>`:'—'}</div></div>
            <div class="sb"><div class="sk">Counterfactual Confirmed</div><div class="ss">replay flips outcome</div></div>
            <div class="sbig tnum">${a.confirmed}</div></div>
          <div class="revcard">
            <div><div class="rk">Mean Confidence</div><div class="rv tnum"><span class="countup" data-count="${Math.round(MEAN_CONF*100)}" data-suf="%">${pct0(MEAN_CONF)}</span></div><span class="rpill">self-consistency</span></div>
            ${sparkline(confSeries.length?confSeries:[0,1],'#22C55E',96,46,false)}
          </div>
        </div></div>
      </div>
    </div>
  </div></div>`;
}

/* ============ RUNS ============ */
function viewRuns(){
  const q=S.q.toLowerCase();
  const items=RUNS.filter(r=>!q||r.run_id.toLowerCase().includes(q)||(r.ticket&&(r.ticket.id+r.ticket.title).toLowerCase().includes(q))||(r.attribution.decisive_step_type||'').includes(q));
  if(items.length&&!items.find(r=>r.run_id===S.runId))S.runId=items[0].run_id;
  const list=items.map(r=>{const f=isFail(r),a=r.attribution;
    return `<div class="rcard ${r.run_id===S.runId?'active':''}" onclick="pickRun('${r.run_id}')">
      <div class="top"><span class="rid">${esc(r.ticket?r.ticket.id:r.run_id)}</span><span class="tag ${f?'fail':'pass'}">${f?'FAILED':'PASS'}</span></div>
      <div class="rsub"><span class="d" style="background:${f?'var(--bad)':'var(--good)'}"></span>
        <span>${f?esc(NICE[a.decisive_step_type]||a.decisive_step_type):'task ok'}</span>
        <span style="margin-left:auto" class="tnum">${fmtMs(r.total_ms)}</span></div></div>`;}).join('')||'<div class="empty">No matching runs</div>';
  return `<div class="fadein"><div class="runs-layout">
    <div class="card runlist"><div class="hd"><h3>Runs</h3><span class="muted tiny tnum">${items.length}</span></div>
      <div class="bd" style="padding:8px 12px 12px;min-height:0;display:flex;flex-direction:column;overflow:hidden">
        <div class="rs">${list}</div></div></div>
    <div id="runDetail">${runDetail(runById(S.runId))}</div>
  </div></div>`;
}
function runDetail(run){
  if(!run)return '<div class="card"><div class="empty">Select a run</div></div>';
  const a=run.attribution,f=isFail(run);
  const steps=[...((run.trajectory&&run.trajectory.steps)||[])].sort((x,y)=>x.step_index-y.step_index);
  const dec=a.decisive_step_id;
  const sclass=s=>{if(s.step_id===dec)return'dec';const st=(s.status||'').toLowerCase();return st==='error'?'err':(st==='skipped'?'skip':'ok');};
  const sdot=s=>{const st=(s.status||'').toLowerCase();return st==='error'||s.step_id===dec?'err':(st==='skipped'?'skip':'ok');};
  const sico=k=>({ok:'✓',err:'✕',skip:'–'}[k]||'•');
  const trace=steps.map((s,i)=>{const c=sclass(s),d=sdot(s),tool=s.action?s.action.tool_name:'';
    return `${i?'<div class="tconn"></div>':''}<div class="tnode ${c}">${c==='dec'?'<span class="dec-flag">DECISIVE</span>':''}
      <div class="bar"></div><div style="flex:1;min-width:0"><div class="tt">${esc(NICE[s.step_type]||s.step_type||'step')}</div>
      <div class="tsub tnum">${esc(s.span_name||'')}${tool?' · '+esc(tool):''}</div></div>
      <div class="sd ${d}">${sico(d)}</div></div>`;}).join('');
  const ev=(a.evidence||[]).map(e=>`<li><span class="f">${esc(e.field)}</span>
    <span>expected <span class="ex">${esc(fv(e.expected))}</span> · got <span class="ac">${esc(fv(e.actual))}</span></span></li>`).join('')||'<li class="muted">No structured evidence.</li>';
  const cf=a.counterfactual||{};
  const fix=a.recommended_fix?`<div class="reco"><div class="rl"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Recommended Fix</div>
    <div style="font-size:13px">${esc(a.recommended_fix)}</div>
    ${cf.confirms_attribution?`<div class="outcome"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Counterfactual replay flipped the outcome → attribution confirmed</div>`:''}</div>`:'';
  const header=f
    ? `<div class="vtop"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg> Decisive Component</div>
        <div class="vcomp">${esc(NICE[a.decisive_step_type]||a.decisive_step_type||'—')}</div>
        <div class="vwhere tnum">${esc(a.decisive_step_id||'')} · ${esc(a.failure_category||'')}</div>`
    : `<div class="vtop"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> Task Completed</div>
        <div class="vcomp">All components passed</div>
        <div class="vwhere tnum">${esc(run.ticket?run.ticket.id:run.run_id)} routed successfully</div>`;
  return `<div class="colstack">
    <div class="card verdict ${f?'':'ok'}"><div class="bd">
      ${header}
      <div class="vmetrics">
        <div class="vm"><div class="k">Confidence</div><div class="v tnum">${pct(a.confidence||0)}</div></div>
        <div class="vm"><div class="k">CRS</div><div class="v tnum">${a.crs==null?'—':Number(a.crs).toFixed(2)}</div></div>
        <div class="vm"><div class="k">Confirmed</div><div class="v">${a.confirmed?'Yes':(f?'No':'—')}</div></div>
      </div>
      ${a.why?`<div class="bl">Why</div><div class="why">${esc(a.why)}</div>`:''}
      ${fix}
    </div></div>
    <div class="card"><div class="hd"><h3>Execution Trace</h3><span class="muted tiny">${run.ticket?esc(run.ticket.title):''}</span></div>
      <div class="bd"><div class="trace">
        <div class="tnode ok"><div class="bar"></div><div style="flex:1"><div class="tt">Ticket Intake</div><div class="tsub tnum">${esc(run.ticket?run.ticket.id+' · '+(run.ticket.product_area||''):'input')}</div></div><div class="sd ok">▸</div></div>
        <div class="tconn"></div>${trace}
        <div class="tconn"></div>
        <div class="tnode ${run.trajectory&&run.trajectory.final_status==='task_succeeded'?'ok':'err'}"><div class="bar"></div><div style="flex:1"><div class="tt">${run.trajectory&&run.trajectory.final_status==='task_succeeded'?'Routed':'Run Halted'}</div><div class="tsub tnum">final_status: ${esc(run.trajectory?run.trajectory.final_status:'—')}</div></div><div class="sd ${run.trajectory&&run.trajectory.final_status==='task_succeeded'?'ok':'err'}">${run.trajectory&&run.trajectory.final_status==='task_succeeded'?'✓':'✕'}</div></div>
      </div></div></div>
    ${f?`<div class="card"><div class="hd"><h3>Evidence</h3><span class="muted tiny">cited trajectory fields</span></div>
      <div class="bd"><ul class="evlist">${ev}</ul></div></div>`:''}
  </div>`;
}

/* ============ META ============ */
function viewMeta(){
  if(!META)return '<div class="fadein card"><div class="empty">No meta-evaluation data</div></div>';
  const rows=META.per_category.map(c=>`<tr><td><span class="ct"><i style="width:9px;height:9px;border-radius:3px;background:${CC[c.component]||'#999'};display:inline-block"></i>${NICE[c.component]||c.component}</span></td>
    <td class="tnum">${c.precision.toFixed(2)}</td><td class="tnum">${c.recall.toFixed(2)}</td><td class="tnum">${c.f1.toFixed(2)}</td><td class="tnum">${c.support}</td></tr>`).join('');
  return `<div class="fadein">
    <div class="metricbig">
      <div class="mbig"><div class="n tnum" style="color:var(--good)"><span class="countup" data-count="${Math.round(META.attribution_accuracy*100)}" data-suf="%">${pct0(META.attribution_accuracy)}</span></div><div class="l">Attribution Accuracy</div><div class="s">component named correctly</div></div>
      <div class="mbig"><div class="n tnum" style="color:var(--accent)"><span class="countup" data-count="${Math.round(META.step_localization_accuracy*100)}" data-suf="%">${pct0(META.step_localization_accuracy)}</span></div><div class="l">Step Localization</div><div class="s">exact decisive step pinpointed</div></div>
      <div class="mbig"><div class="n tnum" style="color:var(--teal)"><span class="countup" data-count="${Math.round(META.confirmation_rate*100)}" data-suf="%">${pct0(META.confirmation_rate)}</span></div><div class="l">Counterfactual Confirmation</div><div class="s">replay flips the outcome</div></div>
    </div>
    <div class="card" style="margin-top:18px"><div class="hd"><h3>Per-Component Performance</h3><span class="muted tiny">${META.n_cases} labeled cases</span></div>
      <div class="bd"><table class="pc"><thead><tr><th>Component</th><th>Precision</th><th>Recall</th><th>F1</th><th>Support</th></tr></thead><tbody>${rows}</tbody></table></div></div>
  </div>`;
}

/* ============ DRIFT ============ */
function viewDrift(){
  const a=agg();
  const bars=ORDER.map(k=>{const v=a.dist[k],mx=Math.max(1,...ORDER.map(x=>a.dist[x]));
    return `<div style="display:grid;grid-template-columns:130px 1fr 36px;gap:12px;align-items:center;margin:10px 0">
      <span style="display:inline-flex;align-items:center;gap:8px;font-weight:600;text-transform:capitalize;font-size:12.5px"><i style="width:9px;height:9px;border-radius:3px;background:${CC[k]};display:inline-block"></i>${NICE[k]}</span>
      <span style="height:8px;border-radius:5px;background:var(--surface-2);overflow:hidden;display:block"><i style="display:block;height:100%;width:${v/mx*100}%;background:${CC[k]};border-radius:5px"></i></span>
      <span class="tnum" style="text-align:right;font-weight:700">${v}</span></div>`;}).join('');
  return `<div class="fadein"><div class="card"><div class="hd"><h3>Behavioral Drift — Decisive-Component Distribution</h3><span class="muted tiny">across-batch monitor (PSI/KL)</span></div>
    <div class="bd"><p class="why" style="margin:2px 0 14px">Distribution of which component is decisive across the current run batch. A shift here between batches (e.g. retrieval failures spiking after a model update) is what the Drift Monitor flags via PSI / KL divergence.</p>${bars}</div></div></div>`;
}

/* ---------- animation orchestration ---------- */
function countUp(el){
  const raw=el.dataset.count, to=parseFloat(raw); if(isNaN(to))return;
  const suf=el.dataset.suf||'', dec=(raw.split('.')[1]||'').length, dur=900, t0=performance.now();
  el.textContent='0'+suf;
  (function f(t){const k=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-k,3);
    el.textContent=(to*e).toFixed(dec)+suf; if(k<1)requestAnimationFrame(f);})(t0);
}
function animateIn(root){
  root=root||document.getElementById('view'); if(!root)return;
  /* draws & gauge sweep are pure CSS (final state always rendered). Count-up is a
     JS enhancement — only run it when the tab is visible so backgrounded loads still
     show the real numbers instead of 0. */
  if(REDUCED||document.hidden)return;
  root.querySelectorAll('.countup').forEach(countUp);
}

/* ---------- router ---------- */
function render(){
  const v=document.getElementById('view');
  v.innerHTML = S.view==='overview'?viewOverview():S.view==='runs'?viewRuns():S.view==='meta'?viewMeta():S.view==='drift'?viewDrift():viewOverview();
  document.querySelectorAll('.rail .ritem[data-v]').forEach(b=>b.classList.toggle('active',b.dataset.v===S.view));
  animateIn();
}
function setView(v){S.view=v;render();}
function pickRun(id){S.runId=id;
  const d=document.getElementById('runDetail');if(d){d.innerHTML=runDetail(runById(id));animateIn(d);}
  document.querySelectorAll('.rcard').forEach(c=>c.classList.remove('active'));
  if(window.event&&window.event.currentTarget)window.event.currentTarget.classList.add('active');}
function onSearch(q){S.q=q;if(S.view!=='runs'){S.view='runs';render();}else render();}
function toggleTheme(){const r=document.documentElement;const dark=r.getAttribute('data-theme')==='dark';
  r.setAttribute('data-theme',dark?'light':'dark');
  const ic=document.getElementById('themeIcon');
  if(ic)ic.innerHTML=dark
    ?'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>'
    :'<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>';
}
function exportCSV(){
  const rows=[['run_id','ticket','verdict','decisive_component','confidence','crs','confirmed','ms']];
  RUNS.forEach(r=>{const a=r.attribution;rows.push([r.run_id,r.ticket?r.ticket.id:'',a.end_to_end_verdict,a.decisive_step_type||'',a.confidence||'',a.crs==null?'':a.crs,a.confirmed?'yes':'no',r.total_ms||'']);});
  const csv=rows.map(x=>x.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const el=document.createElement('a');el.href=u;el.download='culprit_runs.csv';el.click();URL.revokeObjectURL(u);}
function exportReport(){
  const a=agg();const fail=RUNS.find(isFail);
  const md=`# Culprit — Failure Attribution Report\n\nRuns: ${a.n} · Failures: ${a.nFail} · Mean confidence: ${pct(a.meanConf)}\n`+
    (META?`\nAttribution accuracy: ${pct(META.attribution_accuracy)} · Step localization: ${pct(META.step_localization_accuracy)} · Counterfactual confirmation: ${pct(META.confirmation_rate)} (${META.n_cases} cases)\n`:'')+
    (fail?`\n## Example decisive failure — ${fail.ticket?fail.ticket.id:fail.run_id}\nComponent: ${NICE[fail.attribution.decisive_step_type]}\nWhy: ${fail.attribution.why}\nFix: ${fail.attribution.recommended_fix}\n`:'');
  const b=new Blob([md],{type:'text/markdown'});const u=URL.createObjectURL(b);const el=document.createElement('a');el.href=u;el.download='culprit_report.md';el.click();URL.revokeObjectURL(u);}

render();
</script>
